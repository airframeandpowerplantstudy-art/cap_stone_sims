<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Landing Gear Warning Schematic - Starter</title>
<style>
  :root {
    --panel-bg: #101827;
    --panel-card: #172033;
    --blue: #1e88e5;      /* same continuity blue */
    --blue-dark: #0f5fa8;
    --green: #31d158;
    --red: #ff453a;
    --yellow: #ffd60a;
    --wire: #111;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #e9edf3;
    color: #111;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 14px;
    padding: 14px;
    min-height: 100vh;
  }

  .schematic-wrap {
    background: white;
    border: 3px solid #111;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0,0,0,.18);
    overflow: hidden;
    position: relative;
  }

  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1600 / 968;
     background-image: url("fig18lg.png");
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }

  svg.overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: auto; /* needed for F12 mapper clicks */
  }

  .path {
    pointer-events: none;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 9;
    opacity: 0;
    stroke-dasharray: 18 14;
    animation: flow 0.85s linear infinite;
    filter: drop-shadow(0 0 5px currentColor);
  }

  .path.on { opacity: .9; }
  .path.green { stroke: var(--green); color: var(--green); }
  .path.red { stroke: var(--red); color: var(--red); }
  .path.yellow { stroke: var(--yellow); color: var(--yellow); }

  .switch-arm {
    fill: none;
    stroke: var(--blue);
    stroke-width: 9;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 4px rgba(30,136,229,.75));
    pointer-events: none;
  }

  @keyframes flow {
    to { stroke-dashoffset: -64; }
  }

  .lamp {
    position: absolute;
    width: 142px;
    height: 142px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,.35);
    opacity: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;

    mix-blend-mode: multiply;

    transition:
      opacity .18s ease,
      box-shadow .18s ease;
  }
  .lamp.red { left: 15.9%; top: 21.9%; background: var(--red); }
  .lamp.green { left: 84.1%; top: 20.1%; background: var(--green); }
  .lamp.on {
    opacity: .75;
  }
 .lamp.red.on {
  background: rgba(255, 69, 58, .75);

  box-shadow:
    0 0 10px rgba(255,69,58,.55),
    0 0 22px rgba(255,69,58,.35);
}

.lamp.green.on {
  background: rgba(49, 209, 88, .70);

  box-shadow:
    0 0 10px rgba(49,209,88,.50),
    0 0 22px rgba(49,209,88,.30);
}
  .lamp.blink { animation: blink .55s alternate infinite; }
  @keyframes blink { from { opacity: .35; } to { opacity: 1; } }

  .horn-badge {
    position: absolute;
    left: 40.8%;
    top: 44%;
    transform: translate(-50%, -50%);
    padding: 6px 10px;
    border-radius: 999px;
    font-weight: 800;
    font-size: clamp(10px, 1.1vw, 16px);
    background: #222;
    color: white;
    opacity: 0;
    pointer-events: none;
  }
  .horn-badge.on {
    opacity: 1;
    background: var(--yellow);
    color: #111;
    animation: hornPulse .45s alternate infinite;
  }
  @keyframes hornPulse { from { transform: translate(-50%, -50%) scale(.96); } to { transform: translate(-50%, -50%) scale(1.08); } }
.panel {
    background: var(--panel-bg);
    color: white;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,.22);
  }

  .panel h1 {
    margin: 0 0 12px;
    font-size: 20px;
    line-height: 1.1;
  }

  .control {
    background: var(--panel-card);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .control label {
    display: block;
    font-size: 13px;
    margin-bottom: 8px;
    opacity: .85;
    font-weight: 700;
  }
  .btnrow { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .btnrow.three { grid-template-columns: 1fr 1fr; }

  button {
    border: 0;
    border-radius: 8px;
    padding: 9px 8px;
    background: #26344f;
    color: white;
    cursor: pointer;
    font-weight: 800;
  }
  button:hover { background: #334563; }
  button.selected {
    background: var(--blue);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.22), 0 0 0 2px rgba(30,136,229,.32);
  }

  .status {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .status div {
    background: #0b1220;
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
  }
  .status strong { display:block; margin-bottom: 4px; }

  .note {
    margin-top: 10px;
    font-size: 12px;
    line-height: 1.35;
    opacity: .78;
  }

  @media (max-width: 1000px) {
    .app { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="schematic-wrap">
    <div class="stage" id="stage">
      <div class="lamp red" id="redLamp"></div>
      <div class="lamp green" id="greenLamp"></div>
      <div class="horn-badge" id="hornBadge">HORN</div>
<svg class="overlay" viewBox="0 0 1600 968" preserveAspectRatio="none">
        <!-- Real mapped animated paths from your F12 points -->
        <path id="pathGreenDown" class="path green" d="M758 93 L753 154 L755 193 L1304 191 L1368 238 L1376 645 L1297 649 L1259 691 L1261 741 L1017 748 L978 803 L580 805 L547 853 L357 856 L355 889" />
        <path id="pathRedUnsafe" class="path red" d="M758 93 L756 199 L297 205 L227 249 L232 814 L516 814 L549 855 L353 856 L353 891" />
        <path id="pathRedMismatchRightUp" class="path red" d="M755 93 L755 199 L297 207 L228 252 L230 817 L513 814 L513 661 L926 655 L923 745 L978 803 L585 806 L549 855 L350 856 L350 887" />
        <path id="pathHornLeftOrBothUp" class="path yellow" d="M755 94 L761 193 L755 430 L706 433 L705 475 L759 475 L756 600 L419 602 L419 663 L516 663 L513 811 L550 859 L353 855 L350 889" />
        <path id="pathHornRightUp" class="path yellow" d="M755 94 L758 199 L758 435 L702 435 L705 477 L756 472 L756 594 L422 603 L421 658 L925 653 L926 750 L981 805 L581 806 L550 856 L353 856 L353 887" />
        <path id="pathRedPushTest" class="path red" d="M758 93 L756 199 L297 205 L211 192 L107 188 L102 233" />
        <path id="pathGreenPushTest" class="path green" d="M758 93 L753 154 L755 193 L1306 196 L1384 174 L1498 174 L1496 220" />
        <path id="pathValveNotNeutral" class="path yellow" d="M759 96 L752 204 L756 430 L702 435 L703 472 L753 474 L758 600 L419 605 L424 663 L1217 650 L1258 695 L1261 742 L1017 745 L984 805 L583 806 L549 858 L352 856 L352 892" />
        <path id="pathRedValveNotNeutral" class="path red" d="M1330 328 L758 98 L758 206 L299 206 L230 251 L232 815 L513 813 L516 657 L1214 648 L1259 690 L1259 740 L1019 742 L981 804 L586 804 L549 854 L353 857 L353 888" />
        <path id="pathHornGearUpRetarded" class="path yellow" d="M1066 464 L758 96 L758 430 L703 437 L705 476 L753 474 L758 600 L424 604 L424 661 L514 660 L516 816 L550 857 L350 853 L352 891" />
        <path id="pathHornLeftDownRightUpRetarded" class="path yellow" d="M758 96 L758 430 L703 437 L705 476 L753 474 L758 600 L424 604 L424 661 L514 660 L926 655 L929 748 L983 805 L582 805 L551 854 L352 854 L352 888" />

        
        <!-- Blue switch arms from your switch points -->
        <path id="swLeftGear" class="switch-arm" d="" />
        <path id="swRightGear" class="switch-arm" d="" />
        <path id="swThrottleOne" class="switch-arm" d="" />
        <path id="swThrottleTwo" class="switch-arm" d="" />
        <path id="swRedTest" class="switch-arm" d="" />
        <path id="swGreenTest" class="switch-arm" d="" />
        <path id="swValve" class="switch-arm" d="" />
      </svg>
    </div>
  </div>

  <aside class="panel">
    <h1>Landing Gear Warning<br>Schematic Starter</h1>

    <div class="control">
      <label>Power</label>
      <div class="btnrow">
        <button data-set="power" data-value="off">OFF</button>
        <button data-set="power" data-value="on">ON</button>
      </div>
    </div>

    <div class="control">
  <label>Red Push To Test</label>
  <div class="btnrow">
    <button data-set="redPush" data-value="normal">NORMAL</button>
    <button data-set="redPush" data-value="pressed">PRESS</button>
  </div>
</div>

<div class="control">
  <label>Green Push To Test</label>
  <div class="btnrow">
    <button data-set="greenPush" data-value="normal">NORMAL</button>
    <button data-set="greenPush" data-value="pressed">PRESS</button>
  </div>
</div>

    <div class="control">
      <label>Gear Selector</label>
      <div class="btnrow three">
        <button data-set="gear" data-value="down">DOWN</button>
 
        <button data-set="gear" data-value="up">UP</button>
      </div>
    </div>

    <div class="control">
      <label>Throttle</label>
      <div class="btnrow">
        <button data-set="throttle" data-value="open">OPEN</button>
        <button data-set="throttle" data-value="retarded">RETARDED</button>
      </div>
    </div>

    <div class="control">
      <label>Control Valve</label>
      <div class="btnrow">
        <button data-set="valve" data-value="neutral">NEUTRAL</button>
        <button data-set="valve" data-value="notNeutral">NOT NEUTRAL</button>
      </div>
    </div>

    <div class="control">
      <label>Left Gear Switch</label>
      <div class="btnrow">
        <button data-set="leftGear" data-value="down">DOWN</button>
        <button data-set="leftGear" data-value="up">UP</button>
      </div>
    </div>

    <div class="control">
      <label>Right Gear Switch</label>
      <div class="btnrow">
        <button data-set="rightGear" data-value="down">DOWN</button>
        <button data-set="rightGear" data-value="up">UP</button>
      </div>
    </div>

    <div class="status">
      <div><strong>Green Lamp</strong><span id="greenStatus">OFF</span></div>
      <div><strong>Red Lamp</strong><span id="redStatus">OFF</span></div>
      <div><strong>Horn</strong><span id="hornStatus">OFF</span></div>
      <div><strong>Mode</strong><span id="modeStatus">Ready</span></div>
    </div>

    <p class="note">Blue switch arms and animated paths use your mapped coordinates. Fn+F12 Console mapper is still included for cleanup.</p>
  </aside>
</div>

<script>
const state = {
  power: "on",
  gear: "down",
  throttle: "open",
  valve: "neutral",
  leftGear: "down",
  rightGear: "down",
  redPush: "normal",
  greenPush: "normal",
};

const els = {
  redLamp: document.getElementById("redLamp"),
  greenLamp: document.getElementById("greenLamp"),
  hornBadge: document.getElementById("hornBadge"),

  greenPath: document.getElementById("pathGreenDown"),
  redPath: document.getElementById("pathRedUnsafe"),
  redMismatchRightUpPath: document.getElementById("pathRedMismatchRightUp"),
  hornLeftOrBothUpPath: document.getElementById("pathHornLeftOrBothUp"),
  hornRightUpPath: document.getElementById("pathHornRightUp"),
  redPushPath: document.getElementById("pathRedPushTest"),
  greenPushPath: document.getElementById("pathGreenPushTest"),
  valveNotNeutralPath: document.getElementById("pathValveNotNeutral"),
  hornGearUpRetardedPath: document.getElementById("pathHornGearUpRetarded"),
  redValveNotNeutralPath: document.getElementById("pathRedValveNotNeutral"),
  hornLeftDownRightUpRetardedPath: document.getElementById("pathHornLeftDownRightUpRetarded"),

  swLeftGear: document.getElementById("swLeftGear"),
  swRightGear: document.getElementById("swRightGear"),
  swThrottleOne: document.getElementById("swThrottleOne"),
  swThrottleTwo: document.getElementById("swThrottleTwo"),
  swRedTest: document.getElementById("swRedTest"),
  swGreenTest: document.getElementById("swGreenTest"),
  swValve: document.getElementById("swValve"),

  greenStatus: document.getElementById("greenStatus"),
  redStatus: document.getElementById("redStatus"),
  hornStatus: document.getElementById("hornStatus"),
  modeStatus: document.getElementById("modeStatus")
};

function isDownAndLocked() {
  return state.gear === "down" &&
         state.leftGear === "down" &&
         state.rightGear === "down" &&
         state.valve === "neutral";
}

function isUnsafe() {
  if (state.power !== "on") return false;
  return !isDownAndLocked();
}

function hornShouldSound() {
  if (state.power !== "on") return false;
  return state.throttle === "retarded" && !isDownAndLocked();
}

function setOn(el, yes) {
  el.classList.toggle("on", yes);
}

function setBlink(el, yes) {
  el.classList.toggle("blink", yes);
}

function dLine(x1, y1, x2, y2) {
  return `M ${x1} ${y1} L ${x2} ${y2}`;
}

function updateButtons() {
  document.querySelectorAll("button[data-set]").forEach(btn => {
    btn.classList.toggle("selected", state[btn.dataset.set] === btn.dataset.value);
  });
}


function renderSwitches() {
  els.swLeftGear.setAttribute("d",
    state.leftGear === "down"
      ? dLine(549,855,585,808)
      : dLine(549,855,514,813)
  );

  els.swRightGear.setAttribute("d",
    state.rightGear === "down"
      ? dLine(978,805,1017,747)
      : dLine(978,805,928,750)
  );

  els.swThrottleOne.setAttribute("d",
    state.throttle === "open"
      ? dLine(347,667,324,603)
      : dLine(347,667,344,606)
  );

  els.swThrottleTwo.setAttribute("d",
    state.throttle === "open"
      ? dLine(424,659,399,600)
      : dLine(424,659,421,603)
  );

  els.swRedTest.setAttribute("d",
    state.redPush === "pressed"
      ? dLine(296,207,213,188)
      : dLine(296,207,225,253)
  );

  els.swGreenTest.setAttribute("d",
    state.greenPush === "pressed"
      ? dLine(1306,196,1386,179)
      : dLine(1306,196,1373,235)
  );

  els.swValve.setAttribute("d",
    state.valve === "neutral"
      ? dLine(1261,689,1297,649)
      : dLine(1261,689,1215,652)
  );
}

function hideAllPaths() {
  [
    els.greenPath,
    els.redPath,
    els.redMismatchRightUpPath,
    els.hornLeftOrBothUpPath,
    els.hornRightUpPath,
    els.redPushPath,
    els.greenPushPath,
    els.valveNotNeutralPath,
    els.hornGearUpRetardedPath,
    els.redValveNotNeutralPath,
    els.hornLeftDownRightUpRetardedPath
  ].forEach(p => setOn(p, false));
}

function render() {
  const powerOn = state.power === "on";

  const redPushOn = powerOn && state.redPush === "pressed";
  const greenPushOn = powerOn && state.greenPush === "pressed";
  const pushOverride = redPushOn || greenPushOn;

  const gearDown = state.gear === "down";
  const gearUp = state.gear === "up";
  const throttleRetarded = state.throttle === "retarded";
  const valveNotNeutral = state.valve === "notNeutral";

  const rightUpOnly =
    state.rightGear === "up" &&
    state.leftGear === "down";

  const leftUpOrBothUp =
    state.leftGear === "up";

  const greenSafe =
    powerOn &&
    gearDown &&
    state.leftGear === "down" &&
    state.rightGear === "down" &&
    state.valve === "neutral";

  const valveNotNeutralHorn =
    powerOn &&
    gearDown &&
    throttleRetarded &&
    valveNotNeutral;

  const leftDownRightUpRetarded =
    powerOn &&
    rightUpOnly &&
    throttleRetarded;

  const gearUpRetardedHorn =
    powerOn &&
    gearUp &&
    throttleRetarded &&
    !rightUpOnly;

  const silentValveNotNeutral =
    powerOn &&
    gearDown &&
    valveNotNeutral &&
    !throttleRetarded;

  const redUnsafe =
    powerOn &&
    !greenSafe &&
    !silentValveNotNeutral;

  hideAllPaths();

  // Push-to-test override: only the pressed push-test path is allowed live.
  if (pushOverride) {
    setOn(els.redPushPath, redPushOn);
    setOn(els.greenPushPath, greenPushOn);

    setOn(els.greenLamp, greenPushOn);
    setOn(els.redLamp, redPushOn);
    setBlink(els.redLamp, false);
    setOn(els.hornBadge, false);

    els.greenStatus.textContent = greenPushOn ? "ON" : "OFF";
    els.redStatus.textContent = redPushOn ? "ON" : "OFF";
    els.hornStatus.textContent = "OFF";
    els.modeStatus.textContent = "Push-to-Test";

    updateButtons();
    renderSwitches();
    return;
  }

  const leftUpRetardedHorn =
    powerOn &&
    leftUpOrBothUp &&
    throttleRetarded &&
    !valveNotNeutral;

  const anyHorn =
    valveNotNeutralHorn ||
    gearUpRetardedHorn ||
    leftDownRightUpRetarded ||
    leftUpRetardedHorn;

  // Lamps
  setOn(els.greenLamp, greenSafe);
  setOn(els.redLamp, redUnsafe);
  setBlink(els.redLamp, anyHorn);
  setOn(els.hornBadge, anyHorn);

  // Green safe path
  setOn(els.greenPath, greenSafe);

  // Gear-down + valve not neutral + throttle retarded
  setOn(els.valveNotNeutralPath, valveNotNeutralHorn);
  setOn(els.redValveNotNeutralPath, valveNotNeutralHorn);

  // Gear-up + throttle retarded
  setOn(els.hornGearUpRetardedPath, gearUpRetardedHorn);

  // Left down / right up / throttle retarded
  setOn(els.hornLeftDownRightUpRetardedPath, leftDownRightUpRetarded);

  // Right down / left up / throttle retarded
  setOn(els.hornLeftOrBothUpPath, leftUpRetardedHorn);
  setOn(els.hornRightUpPath, false);

  // Red unsafe paths
  setOn(els.redPath, redUnsafe && !rightUpOnly && !valveNotNeutralHorn);
  setOn(els.redMismatchRightUpPath, redUnsafe && rightUpOnly && !valveNotNeutralHorn);

  els.greenStatus.textContent = greenSafe ? "ON" : "OFF";
  els.redStatus.textContent = redUnsafe ? "ON" : "OFF";
  els.hornStatus.textContent = anyHorn ? "ON" : "OFF";

  if (!powerOn) els.modeStatus.textContent = "Power Off";
  else if (greenSafe) els.modeStatus.textContent = "Gear Down Safe";
  else if (valveNotNeutralHorn) els.modeStatus.textContent = "Valve Not Neutral Horn";
  else if (leftDownRightUpRetarded) els.modeStatus.textContent = "Right Gear Up Warning Horn";
  else if (leftUpRetardedHorn) els.modeStatus.textContent = "Left Gear Up Warning Horn";
  else if (gearUpRetardedHorn) els.modeStatus.textContent = "Gear Up Warning Horn";
  else if (silentValveNotNeutral) els.modeStatus.textContent = "Valve Not Neutral / No Warning";
  else els.modeStatus.textContent = "Unsafe Gear";

  updateButtons();
  renderSwitches();
}

document.querySelectorAll("button[data-set]").forEach(btn => {
  btn.addEventListener("click", () => {
    state[btn.dataset.set] = btn.dataset.value;

    // Helpful auto logic. Delete this block if you want every switch totally manual.
    if (btn.dataset.set === "gear") {
      if (state.gear === "down") {
        state.leftGear = "down";
        state.rightGear = "down";
        state.valve = "neutral";
      }
      if (state.gear === "up") {
        state.leftGear = "up";
        state.rightGear = "up";
        state.valve = "neutral";
      }
    }

    render();
  });
});

render();
</script>
<script>
/* F12 MAPPER TOOL
   Click the schematic image/SVG to print coordinates in DevTools Console.
   Hold SHIFT while clicking to build a path.
*/

let mapPoints = [];

document.addEventListener("click", function (e) {
  const target = e.target;

  if (!target.closest("svg")) return;

  const svg = target.closest("svg");
  const pt = svg.createSVGPoint();

  pt.x = e.clientX;
  pt.y = e.clientY;

  const svgPoint = pt.matrixTransform(svg.getScreenCTM().inverse());

  const x = Math.round(svgPoint.x);
  const y = Math.round(svgPoint.y);

  console.log(`POINT: x="${x}" y="${y}"`);

  if (e.shiftKey) {
    mapPoints.push({ x, y });

    const d = mapPoints
      .map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`))
      .join(" ");

    console.log("PATH d=");
    console.log(d);
  }
});

function clearMappedPath() {
  mapPoints = [];
  console.clear();
  console.log("Mapped path cleared.");
}
</script>
</body>
</html>
