<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fig 18 Landing Gear Schematic Mapper</title>
<style>
  :root{
    --blue:#1f6feb;
    --blue2:#58a6ff;
    --panel:#20242b;
    --panel2:#2b313a;
    --green:#22c55e;
    --red:#ef4444;
    --yellow:#facc15;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:#fff;
  }

  .app{
    display:grid;
    grid-template-columns:260px 1fr;
    height:100vh;
  }

  .panel{
    background:var(--panel);
    border-right:3px solid #3a3f47;
    padding:16px;
    overflow:auto;
  }

  .panel h2{
    margin:0 0 12px;
    font-size:22px;
  }

  .panel h3{
    margin:18px 0 8px;
    font-size:15px;
    color:#c9d1d9;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border:0;
    border-radius:8px;
    color:#fff;
    background:var(--blue);
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
  }

  button:hover{background:#388bfd}

  button.secondary{background:#444c56}
  button.secondary:hover{background:#586069}

  button.danger{background:#9b1c1c}
  button.danger:hover{background:#b91c1c}

  .status{
    background:var(--panel2);
    border:1px solid #444c56;
    border-radius:8px;
    padding:8px;
    margin:8px 0;
    font-size:13px;
    line-height:1.35;
  }

  textarea{
    width:100%;
    min-height:110px;
    resize:vertical;
    border-radius:8px;
    border:1px solid #444c56;
    background:#0d1117;
    color:#d1d5db;
    padding:8px;
    font-family:Consolas, monospace;
    font-size:12px;
  }

  .stage{
    position:relative;
    background:#111;
    overflow:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }

  svg{
    width:min(96vw, 1420px);
    height:auto;
    background:#fff;
    box-shadow:0 0 24px rgba(0,0,0,.65);
    user-select:none;
  }

  image{
    pointer-events:none;
  }

  .trace{
    fill:none;
    stroke:var(--green);
    stroke-width:8;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:18 12;
    opacity:0;
    filter:drop-shadow(0 0 4px var(--green));
    animation:flow 1s linear infinite;
    pointer-events:none;
  }

  .trace.active{opacity:.9}

  .trace.red{
    stroke:var(--red);
    filter:drop-shadow(0 0 4px var(--red));
  }

  .trace.yellow{
    stroke:var(--yellow);
    filter:drop-shadow(0 0 4px var(--yellow));
  }

  @keyframes flow{
    to{stroke-dashoffset:-30}
  }

  .map-dot{
    fill:var(--blue);
    stroke:white;
    stroke-width:4;
    filter:drop-shadow(0 0 5px rgba(31,111,235,.9));
    cursor:pointer;
  }

  .map-dot:hover{
    fill:var(--blue2);
  }

  .map-line{
    fill:none;
    stroke:var(--blue);
    stroke-width:5;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.95;
    pointer-events:none;
  }

  .coord-label{
    font-size:20px;
    fill:#fff;
    stroke:#000;
    stroke-width:4px;
    paint-order:stroke;
    font-weight:bold;
    pointer-events:none;
  }

  .switch-hitbox{
    fill:rgba(31,111,235,.15);
    stroke:var(--blue);
    stroke-width:4;
    stroke-dasharray:10 7;
    cursor:pointer;
  }

  .switch-hitbox:hover{
    fill:rgba(31,111,235,.28);
  }

  .hidden{display:none}
</style>
</head>

<body>
<div class="app">

  <aside class="panel">
    <h2>Fig 18 Mapper</h2>

    <div class="status">
      Click on the schematic to drop blue points. The path code builds itself below.
    </div>

    <h3>System Controls</h3>
    <button onclick="togglePower()">Power: <span id="powerText">OFF</span></button>
    <button onclick="toggleGear()">Gear: <span id="gearText">DOWN</span></button>
    <button onclick="toggleThrottle()">Throttle: <span id="throttleText">OPEN</span></button>
    <button onclick="toggleValve()">Valve: <span id="valveText">NEUTRAL</span></button>

    <h3>Path Mapper</h3>
    <button onclick="startNewPath()">Start New Path</button>
    <button class="secondary" onclick="undoPoint()">Undo Last Point</button>
    <button class="danger" onclick="clearMapper()">Clear Mapper</button>

    <div class="status">
      Last point:<br>
      <span id="lastPoint">none</span>
    </div>

    <textarea id="pathOutput" readonly placeholder="SVG path d will appear here..."></textarea>
    <button class="secondary" onclick="copyPath()">Copy Path d</button>

    <h3>Starter Path Buttons</h3>
    <button onclick="showTrace('greenTrace')">Preview Green Path</button>
    <button onclick="showTrace('redTrace')">Preview Red Path</button>
    <button onclick="showTrace('hornTrace')">Preview Horn Path</button>
    <button class="secondary" onclick="hideAllTraces()">Hide Traces</button>
  </aside>

  <main class="stage">
    <svg id="schematicSvg" viewBox="0 0 1540 920" xmlns="http://www.w3.org/2000/svg">

      <!-- Background schematic image. Keep this file beside the HTML. -->
      <image href="fig18lg.png" x="0" y="0" width="1540" height="920" preserveAspectRatio="xMidYMid meet"></image>

      <!-- Starter animated traces. Replace d values after mapping. -->
      <path id="greenTrace" class="trace" d="M735 188 L1300 188 L1300 640 L1020 646 L890 760 L560 760 L240 760 L240 190" />
      <path id="redTrace" class="trace red" d="M735 188 L240 188 L240 760" />
      <path id="hornTrace" class="trace yellow" d="M735 188 L735 450 L665 450 L665 518 L500 518" />

      <!-- Optional switch hitboxes: blue, larger, easy to drag/edit later -->
      <g id="hitboxes">
        <circle class="switch-hitbox" cx="335" cy="585" r="34" onclick="event.stopPropagation(); markSwitch('Throttle switch')" />
        <circle class="switch-hitbox" cx="575" cy="750" r="34" onclick="event.stopPropagation(); markSwitch('Left gear switch')" />
        <circle class="switch-hitbox" cx="945" cy="750" r="34" onclick="event.stopPropagation(); markSwitch('Right gear switch')" />
        <circle class="switch-hitbox" cx="1215" cy="625" r="34" onclick="event.stopPropagation(); markSwitch('Control valve switch')" />
      </g>

      <!-- Mapper layer -->
      <g id="mapperLayer">
        <path id="mapLine" class="map-line" d=""></path>
      </g>

    </svg>
  </main>

</div>

<script>
const svg = document.getElementById("schematicSvg");
const mapperLayer = document.getElementById("mapperLayer");
const mapLine = document.getElementById("mapLine");
const pathOutput = document.getElementById("pathOutput");
const lastPoint = document.getElementById("lastPoint");

let points = [];

let state = {
  power:false,
  gearDown:true,
  throttleOpen:true,
  valveNeutral:true
};

function svgPoint(evt){
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  return {
    x: Math.round(svgP.x),
    y: Math.round(svgP.y)
  };
}

svg.addEventListener("click", function(evt){
  const p = svgPoint(evt);
  points.push(p);
  redrawMapper();
});

function redrawMapper(){
  document.querySelectorAll(".map-dot,.coord-label").forEach(el => el.remove());

  let d = "";
  points.forEach((p, i) => {
    d += (i === 0 ? `M${p.x} ${p.y}` : ` L${p.x} ${p.y}`);

    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("class", "map-dot");
    dot.setAttribute("cx", p.x);
    dot.setAttribute("cy", p.y);
    dot.setAttribute("r", 13);
    mapperLayer.appendChild(dot);

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("class", "coord-label");
    label.setAttribute("x", p.x + 16);
    label.setAttribute("y", p.y - 16);
    label.textContent = i + 1;
    mapperLayer.appendChild(label);
  });

  mapLine.setAttribute("d", d);
  pathOutput.value = d ? `d="${d}"` : "";

  if(points.length){
    const p = points[points.length - 1];
    lastPoint.textContent = `x:${p.x}, y:${p.y}`;
  }else{
    lastPoint.textContent = "none";
  }
}

function startNewPath(){
  points = [];
  redrawMapper();
}

function undoPoint(){
  points.pop();
  redrawMapper();
}

function clearMapper(){
  points = [];
  redrawMapper();
}

async function copyPath(){
  try{
    await navigator.clipboard.writeText(pathOutput.value);
  }catch(err){
    pathOutput.select();
    document.execCommand("copy");
  }
}

function markSwitch(name){
  lastPoint.textContent = name + " clicked";
}

function hideAllTraces(){
  document.querySelectorAll(".trace").forEach(t => t.classList.remove("active"));
}

function showTrace(id){
  hideAllTraces();
  document.getElementById(id).classList.add("active");
}

function togglePower(){
  state.power = !state.power;
  updateLabels();
  updateSystem();
}

function toggleGear(){
  state.gearDown = !state.gearDown;
  updateLabels();
  updateSystem();
}

function toggleThrottle(){
  state.throttleOpen = !state.throttleOpen;
  updateLabels();
  updateSystem();
}

function toggleValve(){
  state.valveNeutral = !state.valveNeutral;
  updateLabels();
  updateSystem();
}

function updateLabels(){
  document.getElementById("powerText").textContent = state.power ? "ON" : "OFF";
  document.getElementById("gearText").textContent = state.gearDown ? "DOWN" : "UP";
  document.getElementById("throttleText").textContent = state.throttleOpen ? "OPEN" : "RETARDED";
  document.getElementById("valveText").textContent = state.valveNeutral ? "NEUTRAL" : "NOT NEUTRAL";
}

function updateSystem(){
  hideAllTraces();

  if(!state.power) return;

  if(state.gearDown && state.valveNeutral){
    document.getElementById("greenTrace").classList.add("active");
  }

  if(!state.gearDown || !state.valveNeutral){
    document.getElementById("redTrace").classList.add("active");
  }

  if(!state.gearDown && !state.throttleOpen){
    document.getElementById("hornTrace").classList.add("active");
  }
}

updateLabels();
updateSystem();
</script>
</body>
</html>
