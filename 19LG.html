<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Landing Gear Circuit Trainer</title>
<style>
  body{margin:0;font-family:Arial;background:#0b1f33;color:white}
  .wrap{max-width:1100px;margin:auto;padding:20px}
  .panel{background:#eef3f7;color:#111;border-radius:14px;padding:18px}
  button{padding:12px 16px;margin:6px;border:0;border-radius:10px;font-weight:bold;cursor:pointer}
  .on{background:#22c55e;color:#062b12}
  .off{background:#d1d5db;color:#111}
  .wire{stroke:#111;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .flow{stroke:#00aaff;stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round;
        stroke-dasharray:16 14;animation:dash 1s linear infinite;filter:drop-shadow(0 0 6px #00aaff)}
  @keyframes dash{to{stroke-dashoffset:-30}}
  .lamp{fill:white;stroke:#111;stroke-width:3}
  .redOn{fill:#ef4444;filter:drop-shadow(0 0 12px red)}
  .greenOn{fill:#22c55e;filter:drop-shadow(0 0 12px lime)}
  .hornOn{fill:#facc15;filter:drop-shadow(0 0 12px yellow)}
  .txt{font:18px Arial;fill:#111}
  .big{font:bold 22px Arial;fill:#111}
</style>
</head>

<body>
<div class="wrap">
  <h1>Landing Gear Warning Circuit Trainer</h1>
  <p>Click the switches. Blue animated paths show current flow from the 28V DC bus to ground.</p>

  <div>
    <button id="rightBtn" class="off" onclick="toggle('right')">Right Gear Switch: OPEN</button>
    <button id="leftBtn" class="off" onclick="toggle('left')">Left Gear Switch: OPEN</button>
    <button id="controlBtn" class="off" onclick="toggle('control')">Control Valve Switch: NEUTRAL</button>
    <button id="throttleBtn" class="off" onclick="toggle('throttle')">Throttle Switches: OPEN</button>
  </div>

  <div class="panel">
    <svg viewBox="0 0 1000 560" width="100%">

      <text class="big" x="430" y="40">28V DC BUS</text>
      <line class="wire" x1="500" y1="55" x2="500" y2="105"/>

      <!-- base wires -->
      <path class="wire" d="M500 105 H180 V180"/>
      <path class="wire" d="M500 105 H500 V180"/>
      <path class="wire" d="M500 105 H820 V180"/>

      <path class="wire" d="M180 240 V410 H105"/>
      <path class="wire" d="M500 240 V410 H105"/>
      <path class="wire" d="M820 240 V410 H105"/>

      <!-- ground -->
      <line class="wire" x1="105" y1="410" x2="105" y2="455"/>
      <line class="wire" x1="70" y1="455" x2="140" y2="455"/>
      <line class="wire" x1="82" y1="470" x2="128" y2="470"/>
      <line class="wire" x1="94" y1="485" x2="116" y2="485"/>
      <text class="txt" x="55" y="525">GROUND</text>

      <!-- flow paths -->
      <path id="redFlow" class="flow" d="M500 105 H180 V180 V240 V410 H105 V455" style="display:none"/>
      <path id="greenFlow" class="flow" d="M500 105 V180 V240 V410 H105 V455" style="display:none"/>
      <path id="hornFlow" class="flow" d="M500 105 H820 V180 V240 V410 H105 V455" style="display:none"/>

      <!-- red light -->
      <circle id="redLamp" class="lamp" cx="180" cy="210" r="36"/>
      <text class="big" x="170" y="218">R</text>
      <text class="txt" x="120" y="280">Right Gear</text>

      <!-- green light -->
      <circle id="greenLamp" class="lamp" cx="500" cy="210" r="36"/>
      <text class="big" x="487" y="218">G</text>
      <text class="txt" x="440" y="280">Gear Safe</text>

      <!-- horn -->
      <rect id="hornBox" class="lamp" x="780" y="185" width="55" height="50" rx="8"/>
      <polygon id="hornCone" class="lamp" points="835,190 890,165 890,255 835,230"/>
      <text class="txt" x="765" y="280">Warning Horn</text>

      <!-- switch labels -->
      <rect x="130" y="330" width="100" height="45" rx="8" fill="#dbeafe" stroke="#111"/>
      <text class="txt" x="145" y="358">Right SW</text>

      <rect x="450" y="330" width="100" height="45" rx="8" fill="#dbeafe" stroke="#111"/>
      <text class="txt" x="470" y="358">Left SW</text>

      <rect x="735" y="330" width="170" height="45" rx="8" fill="#dbeafe" stroke="#111"/>
      <text class="txt" x="755" y="358">Throttle Switches</text>

      <rect x="390" y="470" width="220" height="45" rx="8" fill="#fff7ed" stroke="#111"/>
      <text class="txt" x="415" y="500">Control Valve Switch</text>
    </svg>
  </div>

  <h3 id="status">Status: No complete path yet.</h3>
</div>

<script>
let state = {
  right:false,
  left:false,
  control:false,
  throttle:false
};

function toggle(name){
  state[name] = !state[name];
  update();
}

function setBtn(id,on,onText,offText){
  const b=document.getElementById(id);
  b.className=on ? "on" : "off";
  b.innerText=on ? onText : offText;
}

function show(id,on){
  document.getElementById(id).style.display = on ? "block" : "none";
}

function cls(id,c){
  document.getElementById(id).setAttribute("class",c);
}

function update(){
  setBtn("rightBtn",state.right,"Right Gear Switch: CLOSED / DOWN","Right Gear Switch: OPEN");
  setBtn("leftBtn",state.left,"Left Gear Switch: CLOSED / DOWN","Left Gear Switch: OPEN");
  setBtn("controlBtn",state.control,"Control Valve Switch: DOWN","Control Valve Switch: NEUTRAL");
  setBtn("throttleBtn",state.throttle,"Throttle Switches: CLOSED","Throttle Switches: OPEN");

  const redOn = state.right;
  const greenOn = state.left && state.control;
  const hornOn = state.throttle && (!state.right || !state.left);

  show("redFlow",redOn);
  show("greenFlow",greenOn);
  show("hornFlow",hornOn);

  cls("redLamp", redOn ? "lamp redOn" : "lamp");
  cls("greenLamp", greenOn ? "lamp greenOn" : "lamp");
  cls("hornBox", hornOn ? "lamp hornOn" : "lamp");
  cls("hornCone", hornOn ? "lamp hornOn" : "lamp");

  let notes=[];
  if(redOn) notes.push("Red light energized");
  if(greenOn) notes.push("Green light energized");
  if(hornOn) notes.push("Warning horn energized");
  if(!notes.length) notes.push("No complete path to ground");

  document.getElementById("status").innerText = "Status: " + notes.join(" | ");
}

update();
</script>
</body>
</html>
