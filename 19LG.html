<div id="gearCircuitTrainer" style="font-family:Arial, Helvetica, sans-serif; max-width:1000px; margin:auto; background:#0b1f33; color:white; padding:18px; border-radius:16px;">
  <h2 style="margin-top:0;">Landing Gear Warning Circuit Trainer</h2>
  <p>Click the switches. Blue dots show electron flow when a path exists from the 28V DC bus to ground.</p>

  <svg viewBox="0 0 900 520" width="100%" style="background:#eef3f7; border-radius:12px; border:2px solid #111;">
    <style>
      .wire{stroke:#111;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;}
      .hot{stroke:#2563eb;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
      .txt{font:18px Arial;fill:#000;}
      .small{font:15px Arial;fill:#000;}
      .tag{fill:#000;}
      .tagText{font:bold 16px Arial;fill:#fff;}
      .switch{stroke:#111;stroke-width:4;cursor:pointer;}
      .clickArea{fill:transparent;cursor:pointer;}
      .lamp{fill:#f8fafc;stroke:#111;stroke-width:2;}
      .redOn{fill:#ef4444;stroke:#111;stroke-width:2;filter:drop-shadow(0 0 8px #ef4444);}
      .greenOn{fill:#22c55e;stroke:#111;stroke-width:2;filter:drop-shadow(0 0 8px #22c55e);}
      .hornOn{fill:#facc15;stroke:#111;stroke-width:2;filter:drop-shadow(0 0 8px #facc15);}
      .electron{fill:#2563eb;opacity:0;}
      .electron.on{opacity:1;}
    </style>

    <!-- 28V BUS -->
    <rect x="480" y="20" width="170" height="24" fill="#fff" stroke="#111" stroke-width="2"/>
    <text class="txt" x="535" y="39">28 V DC</text>
    <circle cx="570" cy="48" r="4" fill="#111"/>
    <circle cx="570" cy="75" r="4" fill="#111"/>
    <line class="wire" x1="570" y1="48" x2="570" y2="125"/>

    <!-- Main wires based on image -->
    <path class="wire" d="M570 75 H125 V105 H55"/>
    <path class="wire" d="M570 75 H690 V220 H735"/>
    <path class="wire" d="M570 95 H625 V105"/>
    <path class="wire" d="M625 105 V132 H555"/>
    <path class="wire" d="M555 160 H200"/>
    <path class="wire" d="M555 160 H595 V275 H300 V235"/>
    <path class="wire" d="M300 235 V330 H455"/>
    <path class="wire" d="M455 330 H665"/>
    <path class="wire" d="M665 250 V330"/>
    <path class="wire" d="M690 250 H735"/>
    <path class="wire" d="M690 250 V310 H665"/>
    <path class="wire" d="M125 105 H125 V380 H95"/>
    <path class="wire" d="M95 380 H95 V455 H455 V330"/>
    <path class="wire" d="M95 380 H160"/>
    <path class="wire" d="M200 160 H125"/>

    <!-- Grounds -->
    <line class="wire" x1="125" y1="390" x2="125" y2="410"/>
    <line class="wire" x1="110" y1="410" x2="140" y2="410"/>
    <line class="wire" x1="115" y1="418" x2="135" y2="418"/>

    <line class="wire" x1="300" y1="160" x2="300" y2="175"/>
    <line class="wire" x1="285" y1="175" x2="315" y2="175"/>
    <line class="wire" x1="290" y1="183" x2="310" y2="183"/>
    <text class="small" x="305" y="154">Test</text>

    <!-- Lamps -->
    <circle id="redLamp" class="lamp" cx="55" cy="105" r="20"/>
    <text class="txt" x="48" y="112">R</text>

    <circle id="greenLamp" class="lamp" cx="625" cy="105" r="20"/>
    <text class="txt" x="617" y="112">G</text>

    <!-- Horn -->
    <rect id="hornBox" class="lamp" x="735" y="220" width="35" height="38"/>
    <polygon id="hornCone" class="lamp" points="770,226 805,210 805,268 770,252"/>
    <text class="txt" x="708" y="205">Warning horn</text>

    <!-- Clickable switches -->
    <g onclick="toggleSwitch('rightGear')">
      <text class="txt" x="145" y="400">Right gear switch</text>
      <circle cx="125" cy="380" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="170" cy="360" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line id="rightGearSwitch" class="switch" x1="125" y1="380" x2="170" y2="360"/>
      <text class="txt" x="155" y="340">Down</text>
      <rect class="clickArea" x="105" y="335" width="200" height="85"/>
    </g>

    <g onclick="toggleSwitch('leftGear')">
      <text class="txt" x="370" y="400">Left gear switch</text>
      <circle cx="455" cy="330" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="420" cy="330" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line id="leftGearSwitch" class="switch" x1="455" y1="330" x2="420" y2="330"/>
      <text class="txt" x="405" y="305">Down</text>
      <rect class="clickArea" x="360" y="290" width="180" height="120"/>
    </g>

    <g onclick="toggleSwitch('controlValve')">
      <text class="txt" x="270" y="270">Control</text>
      <text class="txt" x="270" y="292">valve</text>
      <text class="txt" x="270" y="314">switch</text>
      <circle cx="300" cy="235" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="335" cy="235" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="335" cy="270" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line id="controlValveSwitch" class="switch" x1="300" y1="235" x2="335" y2="270"/>
      <text class="txt" x="345" y="230">Neutral</text>
      <rect class="clickArea" x="260" y="210" width="190" height="115"/>
    </g>

    <g onclick="toggleSwitch('throttle')">
      <text class="txt" x="665" y="370">Throttle switches</text>
      <circle cx="665" cy="310" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="715" cy="310" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="665" cy="345" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <circle cx="715" cy="345" r="4" fill="#fff" stroke="#111" stroke-width="2"/>
      <line id="throttleSwitch1" class="switch" x1="665" y1="310" x2="700" y2="285"/>
      <line id="throttleSwitch2" class="switch" x1="665" y1="345" x2="700" y2="320"/>
      <rect class="clickArea" x="630" y="280" width="160" height="105"/>
    </g>

    <!-- Number tags -->
    <g>
      <rect class="tag" x="315" y="64" width="36" height="24"/><text class="tagText" x="323" y="82">#1</text>
      <rect class="tag" x="145" y="105" width="36" height="24"/><text class="tagText" x="153" y="123">#2</text>
      <rect class="tag" x="245" y="160" width="36" height="24"/><text class="tagText" x="253" y="178">#3</text>
      <rect class="tag" x="110" y="250" width="36" height="24"/><text class="tagText" x="118" y="268">#4</text>
      <rect class="tag" x="315" y="360" width="36" height="24"/><text class="tagText" x="323" y="378">#5</text>
      <rect class="tag" x="320" y="445" width="36" height="24"/><text class="tagText" x="328" y="463">#6</text>
      <rect class="tag" x="330" y="292" width="36" height="24"/><text class="tagText" x="338" y="310">#7</text>
      <rect class="tag" x="485" y="205" width="36" height="24"/><text class="tagText" x="493" y="223">#8</text>
      <rect class="tag" x="520" y="128" width="36" height="24"/><text class="tagText" x="528" y="146">#9</text>
      <rect class="tag" x="670" y="155" width="42" height="24"/><text class="tagText" x="678" y="173">#10</text>
      <rect class="tag" x="670" y="260" width="42" height="24"/><text class="tagText" x="678" y="278">#11</text>
      <rect class="tag" x="550" y="335" width="42" height="24"/><text class="tagText" x="558" y="353">#12</text>
      <rect class="tag" x="430" y="270" width="42" height="24"/><text class="tagText" x="438" y="288">#13</text>
    </g>

    <!-- Highlight paths -->
    <path id="redFlowPath" class="hot" d="M570 75 H125 V105 H55 M125 105 V380 H125 V410" style="display:none;"/>
    <path id="greenFlowPath" class="hot" d="M570 95 H625 V132 H555 V160 H595 V275 H300 V235" style="display:none;"/>
    <path id="hornFlowPath" class="hot" d="M570 75 H690 V220 H735 M770 240 H690 V310 H665 V330 H455 V455 H95 V410" style="display:none;"/>

    <!-- Electrons -->
    <circle id="redE" class="electron" r="6">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M570 75 H125 V105 H55 H125 V380 H125 V410"/>
    </circle>

    <circle id="greenE" class="electron" r="6">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M570 95 H625 V132 H555 V160 H595 V275 H300 V235"/>
    </circle>

    <circle id="hornE" class="electron" r="6">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M570 75 H690 V220 H735 H770 H690 V310 H665 V330 H455 V455 H95 V410"/>
    </circle>

  </svg>

  <div style="margin-top:14px; background:#102a44; padding:12px; border-radius:10px;">
    <strong>Status:</strong> <span id="status">Click switches to test circuit paths.</span>
  </div>
</div>

<script>
  const circuit = {
    rightGear: false,
    leftGear: false,
    controlValve: false,
    throttle: false
  };

  function toggleSwitch(name) {
    circuit[name] = !circuit[name];
    updateCircuit();
  }

  function setClass(id, cls) {
    document.getElementById(id).setAttribute("class", cls);
  }

  function show(id, on) {
    document.getElementById(id).style.display = on ? "block" : "none";
  }

  function electron(id, on) {
    document.getElementById(id).setAttribute("class", on ? "electron on" : "electron");
  }

  function updateSwitchGraphics() {
    const right = document.getElementById("rightGearSwitch");
    right.setAttribute("x2", circuit.rightGear ? "125" : "170");
    right.setAttribute("y2", circuit.rightGear ? "410" : "360");

    const left = document.getElementById("leftGearSwitch");
    left.setAttribute("x2", circuit.leftGear ? "420" : "420");
    left.setAttribute("y2", circuit.leftGear ? "330" : "365");

    const control = document.getElementById("controlValveSwitch");
    control.setAttribute("x2", circuit.controlValve ? "335" : "335");
    control.setAttribute("y2", circuit.controlValve ? "235" : "270");

    const t1 = document.getElementById("throttleSwitch1");
    const t2 = document.getElementById("throttleSwitch2");

    t1.setAttribute("x2", circuit.throttle ? "715" : "700");
    t1.setAttribute("y2", circuit.throttle ? "310" : "285");

    t2.setAttribute("x2", circuit.throttle ? "715" : "700");
    t2.setAttribute("y2", circuit.throttle ? "345" : "320");
  }

  function updateCircuit() {
    updateSwitchGraphics();

    const redOn = circuit.rightGear;
    const greenOn = circuit.leftGear && circuit.controlValve;
    const hornOn = circuit.throttle && (!circuit.rightGear || !circuit.leftGear);

    setClass("redLamp", redOn ? "redOn" : "lamp");
    setClass("greenLamp", greenOn ? "greenOn" : "lamp");
    setClass("hornBox", hornOn ? "hornOn" : "lamp");
    setClass("hornCone", hornOn ? "hornOn" : "lamp");

    show("redFlowPath", redOn);
    show("greenFlowPath", greenOn);
    show("hornFlowPath", hornOn);

    electron("redE", redOn);
    electron("greenE", greenOn);
    electron("hornE", hornOn);

    let active = [];
    if (redOn) active.push("R circuit energized");
    if (greenOn) active.push("G circuit energized");
    if (hornOn) active.push("Warning horn energized");

    document.getElementById("status").innerHTML =
      active.length ? active.join(" | ") : "No complete path to ground.";
  }

  updateCircuit();
</script>
