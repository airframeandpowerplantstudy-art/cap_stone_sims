<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Landing Gear Circuit Trainer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f33;
    color: white;
  }

  .wrap {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  .card {
    background: #102a44;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 15px;
  }

  button {
    padding: 12px 16px;
    margin: 6px;
    border: 0;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  .on {
    background: #22c55e;
    color: #052e16;
  }

  .off {
    background: #d1d5db;
    color: #111827;
  }

  .test {
    background: #f2b705;
    color: #111827;
  }

  .diagramBox {
    background: white;
    border-radius: 14px;
    overflow: hidden;
  }

  #diagram {
    width: 100%;
    display: block;
  }

  .status {
    font-size: 18px;
  }
</style>
</head>

<body>

<div class="wrap">

  <h1>Landing Gear Warning Circuit Trainer</h1>

  <div class="card">
    <p>
      Click the switches to change circuit conditions. The schematic updates to show
      switch positions and current flow.
    </p>

    <button id="rightBtn" class="off" onclick="toggleSwitch('right')">
      Right Gear Switch: OPEN
    </button>

    <button id="leftBtn" class="off" onclick="toggleSwitch('left')">
      Left Gear Switch: OPEN
    </button>

    <button id="controlBtn" class="off" onclick="toggleSwitch('control')">
      Control Valve Switch: NEUTRAL
    </button>

    <button id="throttleBtn" class="off" onclick="toggleSwitch('throttle')">
      Throttle Switches: OPEN
    </button>

    <button id="testBtn" class="test" onclick="pushTest()">
      Push To Test
    </button>
  </div>

  <div class="diagramBox">
    <img id="diagram" src="19lgoff.png" alt="Landing gear circuit diagram">
  </div>

  <div class="card status">
    <strong>Status:</strong>
    <span id="statusText">No complete circuit path shown.</span>
  </div>

</div>

<script>
  const state = {
    right: false,
    left: false,
    control: false,
    throttle: false
  };

  function toggleSwitch(name) {
    state[name] = !state[name];
    updateTrainer();
  }

  function setButton(id, isOn, onText, offText) {
    const btn = document.getElementById(id);
    btn.className = isOn ? "on" : "off";
    btn.innerText = isOn ? onText : offText;
  }

  function pushTest() {
    document.getElementById("diagram").src = "19lgpushtest.png";
    document.getElementById("statusText").innerText =
      "Push-to-test circuit condition shown.";

    setTimeout(updateTrainer, 2000);
  }

  function updateTrainer() {
    setButton(
      "rightBtn",
      state.right,
      "Right Gear Switch: DOWN / CLOSED",
      "Right Gear Switch: OPEN"
    );

    setButton(
      "leftBtn",
      state.left,
      "Left Gear Switch: DOWN / CLOSED",
      "Left Gear Switch: OPEN"
    );

    setButton(
      "controlBtn",
      state.control,
      "Control Valve Switch: DOWN",
      "Control Valve Switch: NEUTRAL"
    );

    setButton(
      "throttleBtn",
      state.throttle,
      "Throttle Switches: CLOSED / RETARDED",
      "Throttle Switches: OPEN"
    );

    let image = "19lgoff.png";
    let status = "No complete circuit path shown.";

    if (!state.right && !state.left && !state.control && !state.throttle) {
      image = "19lgoff.png";
      status = "Circuit is off. No complete path shown.";
    }

    if (state.right && !state.left) {
      image = "19lgup.png";
      status = "Unsafe gear condition shown.";
    }

    if (!state.right && state.left) {
      image = "19lgleftup.png";
      status = "Left gear switch condition shown.";
    }

    if (state.left && state.control) {
      image = "19lgon.png";
      status = "Gear-down indication circuit shown.";
    }

    if (state.throttle && (!state.right || !state.left)) {
      image = "19lgupretard.png";
      status = "Throttle retarded with unsafe gear condition. Warning horn circuit shown.";
    }

    if (state.right && state.left && state.control) {
      image = "19lgctlvalnotneutral.png";
      status = "Control valve not neutral condition shown.";
    }

    document.getElementById("diagram").src = image;
    document.getElementById("statusText").innerText = status;
  }

  updateTrainer();
</script>

</body>
</html>
