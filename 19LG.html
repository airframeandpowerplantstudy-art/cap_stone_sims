<div id="trainer" style="font-family:Arial, sans-serif; max-width:1000px; margin:auto; background:#0b1f33; color:white; padding:18px; border-radius:16px;">
  <h2>Landing Gear Warning Circuit Trainer</h2>
  <p>Click the switch areas. Blue dots show flow only when a complete path exists.</p>

  <div style="position:relative; width:100%; max-width:900px; margin:auto;">
    <img src="fig19lg.png" style="width:100%; display:block; border-radius:10px;">

    <svg viewBox="0 0 866 522" style="position:absolute; left:0; top:0; width:100%; height:100%;">

      <style>
        .clickBox { fill:rgba(255,255,0,0.05); stroke:rgba(255,255,0,0.4); stroke-width:2; cursor:pointer; }
        .electron { fill:#00aaff; opacity:0; filter:drop-shadow(0 0 6px #00aaff); }
        .flowLine { stroke:#00aaff; stroke-width:5; fill:none; opacity:0; stroke-linecap:round; stroke-linejoin:round; }
        .glowRed { fill:#ff3333; opacity:0; filter:drop-shadow(0 0 10px red); }
        .glowGreen { fill:#22c55e; opacity:0; filter:drop-shadow(0 0 10px lime); }
        .glowHorn { fill:#facc15; opacity:0; filter:drop-shadow(0 0 10px yellow); }
        .label { font: bold 15px Arial; fill:#0b1f33; }
      </style>

      <!-- Glow overlays for R, G, and horn -->
      <circle id="redGlow" class="glowRed" cx="62" cy="104" r="22"></circle>
      <circle id="greenGlow" class="glowGreen" cx="630" cy="104" r="22"></circle>
      <rect id="hornGlow" class="glowHorn" x="720" y="215" width="95" height="65" rx="10"></rect>

      <!-- Flow paths -->
      <path id="redFlowLine" class="flowLine" d="M565 70 H125 V105 H62"></path>
      <path id="greenFlowLine" class="flowLine" d="M565 70 H630 V105"></path>
      <path id="hornFlowLine" class="flowLine" d="M565 70 H690 V240 H750"></path>

      <!-- Electrons -->
      <circle id="redElectron" class="electron" r="6">
        <animateMotion dur="2s" repeatCount="indefinite" path="M565 70 H125 V105 H62" />
      </circle>

      <circle id="greenElectron" class="electron" r="6">
        <animateMotion dur="2s" repeatCount="indefinite" path="M565 70 H630 V105" />
      </circle>

      <circle id="hornElectron" class="electron" r="6">
        <animateMotion dur="2s" repeatCount="indefinite" path="M565 70 H690 V240 H750" />
      </circle>

      <!-- Clickable switch zones -->
      <rect class="clickBox" x="95" y="350" width="125" height="65" onclick="toggleSwitch('rightGear')" />
      <text class="label" x="100" y="345">Right Gear Switch</text>

      <rect class="clickBox" x="390" y="300" width="130" height="65" onclick="toggleSwitch('leftGear')" />
      <text class="label" x="390" y="295">Left Gear Switch</text>

      <rect class="clickBox" x="275" y="215" width="125" height="95" onclick="toggleSwitch('controlValve')" />
      <text class="label" x="275" y="210">Control Valve Switch</text>

      <rect class="clickBox" x="650" y="300" width="135" height="80" onclick="toggleSwitch('throttle')" />
      <text class="label" x="650" y="295">Throttle Switches</text>

    </svg>
  </div>

  <div style="margin-top:14px; background:#102a44; padding:12px; border-radius:10px;">
    <strong>Switch Status:</strong>
    <span id="switchStatus">All switches open.</span>
  </div>
</div>

<script>
  const switches = {
    rightGear: false,
    leftGear: false,
    controlValve: false,
    throttle: false
  };

  function toggleSwitch(name) {
    switches[name] = !switches[name];
    updateCircuit();
  }

  function setVisible(id, isVisible) {
    document.getElementById(id).style.opacity = isVisible ? "1" : "0";
  }

  function updateCircuit() {
    const redOn = switches.rightGear;
    const greenOn = switches.leftGear && switches.controlValve;
    const hornOn = switches.throttle && (!switches.leftGear || !switches.rightGear);

    setVisible("redGlow", redOn);
    setVisible("redElectron", redOn);
    setVisible("redFlowLine", redOn);

    setVisible("greenGlow", greenOn);
    setVisible("greenElectron", greenOn);
    setVisible("greenFlowLine", greenOn);

    setVisible("hornGlow", hornOn);
    setVisible("hornElectron", hornOn);
    setVisible("hornFlowLine", hornOn);

    let status = [];
    status.push("Right Gear: " + (switches.rightGear ? "closed" : "open"));
    status.push("Left Gear: " + (switches.leftGear ? "closed" : "open"));
    status.push("Control Valve: " + (switches.controlValve ? "closed" : "open"));
    status.push("Throttle: " + (switches.throttle ? "closed" : "open"));

    document.getElementById("switchStatus").innerHTML = status.join(" | ");
  }

  updateCircuit();
</script>
