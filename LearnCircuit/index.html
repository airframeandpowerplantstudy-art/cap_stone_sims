<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PEIR Circuit Trainer</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #061522;
  margin: 0;
  color: #e8f3ff;
}

.wrap {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 { text-align: center; }

.controls, .game {
  background: #0b2236;
  border: 1px solid #1d4d73;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 18px;
  box-shadow: 0 0 18px rgba(0,140,255,.18);
}

label {
  margin-right: 12px;
  font-weight: bold;
}

select, button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #3ea6ff;
  font-size: 15px;
}

button {
  background: #123a57;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1b567f;
  box-shadow: 0 0 10px rgba(62,166,255,.6);
}

svg {
  width: 100%;
  height: 220px;
  background: #08131f;
  border: 1px solid #1d4d73;
  border-radius: 8px;
}

svg text {
  fill: #7fd3ff;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 18px;
}

th {
  background: #12344d;
  color: #9fd8ff;
  padding: 10px;
  font-size: 18px;
}

td {
  border: 1px solid #214d70;
  padding: 8px;
  text-align: center;
  background: #0c1c2b;
}

input {
  width: 85%;
  padding: 8px;
  font-size: 16px;
  text-align: center;
  background: #16324a;
  color: white;
  border: 1px solid #3c7db0;
  border-radius: 6px;
}

input.locked {
  background: #29597d;
  color: #cfefff;
  font-weight: bold;
}

input.correct { background: #1f7a45; }
input.wrong { background: #7a1f1f; }

.status {
  font-size: 18px;
  font-weight: bold;
  margin-top: 12px;
}

.hint {
  background: #14304a;
  border: 1px solid #3ea6ff;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>PEIR Circuit Trainer</h1>

  <div class="controls">
    <label>Circuit Type:</label>
    <select id="type">
      <option value="series">Series</option>
      <option value="parallel">Parallel</option>
    </select>

    <label>Resistors:</label>
    <select id="count"></select>

    <button onclick="newGame()">New Circuit</button>
    <button onclick="checkAnswers()">Check Answers</button>
    <button onclick="showHint()">Hint (-1)</button>
    <button onclick="showFormula()">Show Formula (-1)</button>
  </div>

  <div class="game">
    <svg id="circuit"></svg>

    <table id="chart">
      <thead>
        <tr>
          <th>POWER</th>
          <th>VOLTAGE</th>
          <th>CURRENT</th>
          <th>RESISTANCE</th>
          <th>LOAD</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="status" id="score">Score: 10/10</div>
    <div class="hint" id="hintBox"></div>
  </div>
</div>

<script>
let answerKey = [];
let score = 10;
let circuitType = "series";
let resistorCount = 3;

const BLUE = "#7fd3ff";

for (let i = 1; i <= 10; i++) {
  document.getElementById("count").innerHTML += `<option value="${i}">${i}</option>`;
}
document.getElementById("count").value = 3;

function round(num) {
  return Math.round(num * 100) / 100;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function newGame() {
  score = 10;
  circuitType = document.getElementById("type").value;
  resistorCount = Number(document.getElementById("count").value);

  document.getElementById("hintBox").style.display = "none";
  document.getElementById("score").textContent = "Score: 10/10";

  generateCircuit();
  drawCircuit();
  buildChart();
}

function generateCircuit() {
  answerKey = [];
  let resistors = [];

  for (let i = 0; i < resistorCount; i++) {
    resistors.push(rand(2, 12));
  }

  if (circuitType === "series") {
    let current = rand(1, 8);
    let totalResistance = resistors.reduce((a,b) => a + b, 0);
    let totalVoltage = current * totalResistance;
    let totalPower = current * totalVoltage;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let e = current * r;
      let p = current * e;

      answerKey.push({
        p: round(p),
        e: round(e),
        i: round(current),
        r: round(r),
        label: "R" + (i + 1)
      });
    }

    answerKey.push({
      p: round(totalPower),
      e: round(totalVoltage),
      i: round(current),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }

  if (circuitType === "parallel") {
    let voltage = rand(12, 48);
    let totalCurrent = 0;
    let totalPower = 0;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let current = voltage / r;
      let power = voltage * current;

      totalCurrent += current;
      totalPower += power;

      answerKey.push({
        p: round(power),
        e: round(voltage),
        i: round(current),
        r: round(r),
        label: "R" + (i + 1)
      });
    }

    let totalResistance = voltage / totalCurrent;

    answerKey.push({
      p: round(totalPower),
      e: round(voltage),
      i: round(totalCurrent),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }
}

function buildChart() {
  const tbody = document.querySelector("#chart tbody");
  tbody.innerHTML = "";

  answerKey.forEach(row => {
    let tr = document.createElement("tr");

    ["p", "e", "i", "r"].forEach(key => {
      let td = document.createElement("td");
      let input = document.createElement("input");

      input.dataset.answer = row[key];

      let reveal = false;

      if (key === "r" && row.label !== "TOTAL") reveal = true;
      if (row.label === "TOTAL" && key === "e") reveal = true;

      if (reveal) {
        input.value = row[key];
        input.readOnly = true;
        input.classList.add("locked");
      }

      td.appendChild(input);
      tr.appendChild(td);
    });

    let label = document.createElement("td");
    label.textContent = row.label;
    tr.appendChild(label);

    tbody.appendChild(tr);
  });
}

function checkAnswers() {
  let inputs = document.querySelectorAll("input:not(.locked)");
  let allCorrect = true;

  inputs.forEach(input => {
    let user = Number(input.value);
    let correct = Number(input.dataset.answer);

    input.classList.remove("correct", "wrong");

    if (Math.abs(user - correct) <= 0.05) {
      input.classList.add("correct");
    } else {
      input.classList.add("wrong");
      allCorrect = false;
    }
  });

  if (!allCorrect) {
    losePoint();
  } else {
    document.getElementById("score").textContent = `Circuit Complete! Score: ${score}/10`;
  }
}

function losePoint() {
  if (score > 1) score--;
  document.getElementById("score").textContent = `Score: ${score}/10`;
}

function showHint() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";

  if (circuitType === "series") {
    box.innerHTML = `
      <b>Series Hint:</b><br>
      Current stays the same through every resistor.<br>
      Resistance adds.<br>
      Voltage adds.<br>
      Power adds.
    `;
  } else {
    box.innerHTML = `
      <b>Parallel Hint:</b><br>
      Voltage stays the same across every branch.<br>
      Current adds.<br>
      Power adds.<br>
      Total resistance uses reciprocal resistance.
    `;
  }
}

function showFormula() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";
  box.innerHTML = `
    <b>Formulas:</b><br>
    E = I × R<br>
    I = E ÷ R<br>
    R = E ÷ I<br>
    P = I × E<br>
    Series RT = R1 + R2 + R3...<br>
    Parallel RT = 1 ÷ (1/R1 + 1/R2 + 1/R3...)
  `;
}

function line(x1,y1,x2,y2) {
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${BLUE}" stroke-width="3" filter="url(#glow)"/>`;
}

function drawCircuit() {
  const svg = document.getElementById("circuit");
  svg.setAttribute("viewBox", "0 0 1000 220");

  svg.innerHTML = `
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  `;

  let y = 110;

  // left ground
  svg.innerHTML += line(50,110,80,110);
  svg.innerHTML += line(50,110,50,145);
  svg.innerHTML += line(30,145,70,145);
  svg.innerHTML += line(36,155,64,155);
  svg.innerHTML += line(42,165,58,165);

  // multi-cell battery
  svg.innerHTML += line(80,110,105,110);

  svg.innerHTML += line(105,75,105,145);
  svg.innerHTML += line(125,90,125,130);

  svg.innerHTML += line(145,75,145,145);
  svg.innerHTML += line(165,90,165,130);

  svg.innerHTML += line(185,75,185,145);
  svg.innerHTML += line(205,90,205,130);

  svg.innerHTML += line(205,110,230,110);

  svg.innerHTML += `<text x="88" y="70" font-size="18">+</text>`;
  svg.innerHTML += `<text x="212" y="70" font-size="18">−</text>`;

  let x = 230;
  let spacing = 610 / resistorCount;

  if (circuitType === "series") {
    for (let i = 0; i < resistorCount; i++) {
      let x1 = x;
      let x2 = x + spacing * 0.65;
      let end = x + spacing;

      svg.innerHTML += line(x1,y,x1+20,y);
      svg.innerHTML += zigzag(x1+20, y, x2, y);
      svg.innerHTML += `<text x="${(x1+x2)/2}" y="55" text-anchor="middle" font-size="18">R${i+1}</text>`;
      svg.innerHTML += line(x2,y,end,y);

      x = end;
    }

    let groundX = x + 25;

    svg.innerHTML += line(x,y,groundX,y);
    svg.innerHTML += line(groundX,110,groundX,145);
    svg.innerHTML += line(groundX-20,145,groundX+20,145);
    svg.innerHTML += line(groundX-14,155,groundX+14,155);
    svg.innerHTML += line(groundX-8,165,groundX+8,165);
  }

  if (circuitType === "parallel") {
    svg.innerHTML += line(230,110,260,110);
    svg.innerHTML += line(260,50,260,170);
    svg.innerHTML += line(850,50,850,170);

    let branchGap = 120 / Math.max(resistorCount - 1, 1);

    for (let i = 0; i < resistorCount; i++) {
      let by = resistorCount === 1 ? 110 : 50 + branchGap * i;

      svg.innerHTML += line(260,by,320,by);
      svg.innerHTML += zigzag(320, by, 780, by);
      svg.innerHTML += line(780,by,850,by);
      svg.innerHTML += `<text x="550" y="${by-12}" text-anchor="middle" font-size="16">R${i+1}</text>`;
    }

    svg.innerHTML += line(850,110,920,110);
    svg.innerHTML += line(920,110,920,145);
    svg.innerHTML += line(900,145,940,145);
    svg.innerHTML += line(906,155,934,155);
    svg.innerHTML += line(912,165,928,165);
  }
}

function zigzag(x1, y1, x2, y2) {
  let length = x2 - x1;
  let steps = 8;
  let step = length / steps;
  let path = `M ${x1} ${y1}`;

  for (let i = 1; i < steps; i++) {
    let x = x1 + step * i;
    let y = i % 2 === 0 ? y1 + 18 : y1 - 18;
    path += ` L ${x} ${y}`;
  }

  path += ` L ${x2} ${y2}`;

  return `<path d="${path}" fill="none" stroke="${BLUE}" stroke-width="3" filter="url(#glow)"/>`;
}

newGame();
</script>
</body>
</html>
