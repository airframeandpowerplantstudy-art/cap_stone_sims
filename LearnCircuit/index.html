<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PEIR Circuit Trainer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #061522;
  margin: 0;
  color: #e8f3ff;
}

.wrap {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.controls, .game {
  background: #0b2236;
  border: 1px solid #1d4d73;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 20px;
}

select, button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #3ea6ff;
  font-size: 15px;
}

button {
  background: #123a57;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1b567f;
  box-shadow: 0 0 10px rgba(62,166,255,.6);
}

svg {
  width: 100%;
  height: 260px;
  background: #08131f;
  border: 1px solid #1d4d73;
  border-radius: 8px;
}

.wire {
  stroke: #7fd3ff;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  filter: drop-shadow(0 0 5px #7fd3ff);
}

svg text {
  fill: #7fd3ff;
  font-weight: bold;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 24px;
}

th {
  background: #12344d;
  color: #9fd8ff;
  padding: 10px;
  font-size: 18px;
}

td {
  border: 1px solid #214d70;
  padding: 8px;
  text-align: center;
  background: #0c1c2b;
}

input {
  width: 85%;
  padding: 8px;
  font-size: 16px;
  text-align: center;
  background: #16324a;
  color: white;
  border: 1px solid #3c7db0;
  border-radius: 6px;
}

input.locked {
  background: #2e638c;
  color: white;
  font-weight: bold;
}

input.correct { background: #1f7a45; }
input.wrong { background: #7a1f1f; }

.status {
  font-size: 18px;
  font-weight: bold;
  margin-top: 12px;
}

.hint {
  background: #14304a;
  border: 1px solid #3ea6ff;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="controls">
    <label><b>Circuit Type:</b></label>
    <select id="type">
      <option value="series">Series</option>
      <option value="parallel">Parallel</option>
    </select>

    <label><b>Resistors:</b></label>
    <select id="count"></select>

    <button onclick="newGame()">New Circuit</button>
    <button onclick="checkAnswers()">Check Answers</button>
    <button onclick="showHint()">Hint (-1)</button>
    <button onclick="showFormula()">Show Formula (-1)</button>
  </div>

  <div class="game">
    <svg id="circuit" viewBox="0 0 1000 260"></svg>

    <table id="chart">
      <thead>
        <tr>
          <th>POWER</th>
          <th>VOLTAGE</th>
          <th>CURRENT</th>
          <th>RESISTANCE</th>
          <th>LOAD</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="status" id="score">Score: 10/10</div>
    <div class="hint" id="hintBox"></div>
  </div>
</div>

<script>
let answerKey = [];
let score = 10;
let circuitType = "series";
let resistorCount = 3;

for (let i = 1; i <= 10; i++) {
  document.getElementById("count").innerHTML += `<option value="${i}">${i}</option>`;
}
document.getElementById("count").value = 3;

function round(num) {
  return Math.round(num * 100) / 100;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function newGame() {
  score = 10;
  circuitType = document.getElementById("type").value;
  resistorCount = Number(document.getElementById("count").value);

  document.getElementById("hintBox").style.display = "none";
  document.getElementById("score").textContent = "Score: 10/10";

  generateCircuit();
  drawCircuit();
  buildChart();
}

function generateCircuit() {
  answerKey = [];
  let resistors = [];

  for (let i = 0; i < resistorCount; i++) {
    resistors.push(rand(2, 12));
  }

  if (circuitType === "series") {
    let current = rand(1, 8);
    let totalResistance = resistors.reduce((a,b) => a + b, 0);
    let totalVoltage = current * totalResistance;
    let totalPower = current * totalVoltage;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let e = current * r;
      let p = current * e;

      answerKey.push({
        p: round(p),
        e: round(e),
        i: round(current),
        r: round(r),
        label: "R" + (i + 1)
      });
    }

    answerKey.push({
      p: round(totalPower),
      e: round(totalVoltage),
      i: round(current),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }

  if (circuitType === "parallel") {
    let voltage = rand(12, 48);
    let totalCurrent = 0;
    let totalPower = 0;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let current = voltage / r;
      let power = voltage * current;

      totalCurrent += current;
      totalPower += power;

      answerKey.push({
        p: round(power),
        e: round(voltage),
        i: round(current),
        r: round(r),
        label: "R" + (i + 1)
      });
    }

    let totalResistance = voltage / totalCurrent;

    answerKey.push({
      p: round(totalPower),
      e: round(voltage),
      i: round(totalCurrent),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }
}

function buildChart() {
  const tbody = document.querySelector("#chart tbody");
  tbody.innerHTML = "";

  answerKey.forEach(row => {
    let tr = document.createElement("tr");

    ["p", "e", "i", "r"].forEach(key => {
      let td = document.createElement("td");
      let input = document.createElement("input");

      input.dataset.answer = row[key];

      let reveal = false;

      if (key === "r" && row.label !== "TOTAL") reveal = true;
      if (row.label === "TOTAL" && key === "e") reveal = true;

      if (reveal) {
        input.value = row[key];
        input.readOnly = true;
        input.classList.add("locked");
      }

      td.appendChild(input);
      tr.appendChild(td);
    });

    let label = document.createElement("td");
    label.textContent = row.label;
    tr.appendChild(label);

    tbody.appendChild(tr);
  });
}

function checkAnswers() {
  let inputs = document.querySelectorAll("input:not(.locked)");
  let allCorrect = true;

  inputs.forEach(input => {
    let user = Number(input.value);
    let correct = Number(input.dataset.answer);

    input.classList.remove("correct", "wrong");

    if (Math.abs(user - correct) <= 0.05) {
      input.classList.add("correct");
    } else {
      input.classList.add("wrong");
      allCorrect = false;
    }
  });

  if (!allCorrect) {
    losePoint();
  } else {
    document.getElementById("score").textContent = `Circuit Complete! Score: ${score}/10`;
  }
}

function losePoint() {
  if (score > 1) score--;
  document.getElementById("score").textContent = `Score: ${score}/10`;
}

function showHint() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";

  if (circuitType === "series") {
    box.innerHTML = `
      <b>Series Hint:</b><br>
      Current stays the same through every resistor.<br>
      Resistance adds.<br>
      Voltage adds.<br>
      Power adds.
    `;
  } else {
    box.innerHTML = `
      <b>Parallel Hint:</b><br>
      Voltage stays the same across every branch.<br>
      Current adds.<br>
      Power adds.<br>
      Total resistance uses reciprocal resistance.
    `;
  }
}

function showFormula() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";
  box.innerHTML = `
    <b>Formulas:</b><br>
    E = I × R<br>
    I = E ÷ R<br>
    R = E ÷ I<br>
    P = I × E<br>
    Series RT = R1 + R2 + R3...<br>
    Parallel RT = 1 ÷ (1/R1 + 1/R2 + 1/R3...)
  `;
}

function line(x1,y1,x2,y2) {
  return `<line class="wire" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />`;
}

function drawCircuit() {
  const svg = document.getElementById("circuit");
  svg.innerHTML = "";

  let y = 130;

  // left ground
  svg.innerHTML += line(50,130,80,130);
  svg.innerHTML += line(50,130,50,165);
  svg.innerHTML += line(30,165,70,165);
  svg.innerHTML += line(36,175,64,175);
  svg.innerHTML += line(42,185,58,185);

  // battery: negative left, positive right
  svg.innerHTML += line(80,130,105,130);

  svg.innerHTML += line(105,110,105,150); // short -
  svg.innerHTML += line(125,95,125,165);  // long +

  svg.innerHTML += line(145,110,145,150);
  svg.innerHTML += line(165,95,165,165);

  svg.innerHTML += line(185,110,185,150);
  svg.innerHTML += line(205,95,205,165);

  svg.innerHTML += line(205,130,230,130);

  svg.innerHTML += `<text x="88" y="92" font-size="20">−</text>`;
  svg.innerHTML += `<text x="212" y="92" font-size="20">+</text>`;

  if (circuitType === "series") {
    let x = 230;
    const resistorVisualWidth = 120;
    let wireGap = resistorCount > 1
      ? (610 - resistorVisualWidth * resistorCount) / resistorCount
      : 120;

    if (wireGap < 20) wireGap = 20;

    for (let i = 0; i < resistorCount; i++) {
      let leadStart = x;
      let resistorStart = leadStart + wireGap;
      let resistorEnd = resistorStart + resistorVisualWidth;

      svg.innerHTML += line(leadStart, y, resistorStart, y);
      svg.innerHTML += zigzag(resistorStart, y, resistorEnd, y);
      svg.innerHTML += `<text x="${(resistorStart + resistorEnd) / 2}" y="80" text-anchor="middle" font-size="18">R${i+1}</text>`;

      x = resistorEnd;
    }

    let groundX = x + wireGap + 25;

    svg.innerHTML += line(x, y, groundX, y);
    svg.innerHTML += line(groundX,130,groundX,165);
    svg.innerHTML += line(groundX-20,165,groundX+20,165);
    svg.innerHTML += line(groundX-14,175,groundX+14,175);
    svg.innerHTML += line(groundX-8,185,groundX+8,185);
  }

  if (circuitType === "parallel") {
    svg.innerHTML += line(230,130,260,130);
    svg.innerHTML += line(260,60,260,210);
    svg.innerHTML += line(850,60,850,210);

    let branchGap = 150 / Math.max(resistorCount - 1, 1);

    for (let i = 0; i < resistorCount; i++) {
      let by = resistorCount === 1 ? 130 : 60 + branchGap * i;

      svg.innerHTML += line(260,by,320,by);
      svg.innerHTML += zigzag(320, by, 440, by);
      svg.innerHTML += line(440,by,850,by);
      svg.innerHTML += `<text x="380" y="${by-18}" text-anchor="middle" font-size="16">R${i+1}</text>`;
    }

    svg.innerHTML += line(850,130,920,130);
    svg.innerHTML += line(920,130,920,165);
    svg.innerHTML += line(900,165,940,165);
    svg.innerHTML += line(906,175,934,175);
    svg.innerHTML += line(912,185,928,185);
  }
}

function zigzag(x1, y1, x2, y2) {
  let length = x2 - x1;
  let steps = 8;
  let step = length / steps;
  let path = `M ${x1} ${y1}`;

  for (let i = 1; i < steps; i++) {
    let x = x1 + step * i;
    let y = i % 2 === 0 ? y1 + 18 : y1 - 18;
    path += ` L ${x} ${y}`;
  }

  path += ` L ${x2} ${y2}`;

  return `<path class="wire" d="${path}" />`;
}

newGame();
</script>
</body>
</html>
