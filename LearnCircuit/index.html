<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PEIR Circuit Trainer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #eef2f5;
    margin: 0;
    color: #0b2b40;
  }

  .wrap {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
  }

  .controls, .game {
    background: white;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
    box-shadow: 0 3px 12px rgba(0,0,0,.15);
  }

  label {
    margin-right: 12px;
    font-weight: bold;
  }

  select, button {
    padding: 8px 12px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #888;
    font-size: 15px;
  }

  button {
    background: #0b2b40;
    color: white;
    cursor: pointer;
  }

  svg {
    width: 100%;
    height: 180px;
    background: #fafafa;
    border: 1px solid #ccc;
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 18px;
  }

  th {
    background: #d0d0d0;
    padding: 10px;
    font-size: 18px;
  }

  td {
    border: 1px solid #aaa;
    padding: 8px;
    text-align: center;
  }

  input {
    width: 85%;
    padding: 8px;
    font-size: 16px;
    text-align: center;
  }

  input.locked {
    background: #dcefff;
    font-weight: bold;
  }

  input.correct {
    background: #c8f7c5;
  }

  input.wrong {
    background: #ffcccc;
  }

  .status {
    font-size: 18px;
    font-weight: bold;
    margin-top: 12px;
  }

  .hint {
    background: #fff6c7;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>PEIR Circuit Trainer</h1>

  <div class="controls">
    <label>Circuit Type:</label>
    <select id="type">
      <option value="series">Series</option>
      <option value="parallel">Parallel</option>
    </select>

    <label>Resistors:</label>
    <select id="count"></select>

    <button onclick="newGame()">New Circuit</button>
    <button onclick="checkAnswers()">Check Answers</button>
    <button onclick="showHint()">Hint (-1)</button>
    <button onclick="showFormula()">Show Formula (-1)</button>
  </div>

  <div class="game">
    <svg id="circuit"></svg>

    <table id="chart">
      <thead>
        <tr>
          <th>POWER</th>
          <th>VOLTAGE</th>
          <th>CURRENT</th>
          <th>RESISTANCE</th>
          <th>LOAD</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="status" id="score">Score: 10/10</div>
    <div class="hint" id="hintBox"></div>
  </div>
</div>

<script>
let answerKey = [];
let score = 10;
let circuitType = "series";
let resistorCount = 3;

for (let i = 1; i <= 10; i++) {
  document.getElementById("count").innerHTML += `<option value="${i}">${i}</option>`;
}
document.getElementById("count").value = 3;

function round(num) {
  return Math.round(num * 100) / 100;
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function newGame() {
  score = 10;
  circuitType = document.getElementById("type").value;
  resistorCount = Number(document.getElementById("count").value);
  document.getElementById("hintBox").style.display = "none";
  document.getElementById("score").textContent = "Score: 10/10";

  generateCircuit();
  drawCircuit();
  buildChart();
}

function generateCircuit() {
  answerKey = [];

  let resistors = [];
  for (let i = 0; i < resistorCount; i++) {
    resistors.push(rand(2, 12));
  }

  if (circuitType === "series") {
    let current = rand(1, 8);
    let totalResistance = resistors.reduce((a,b) => a + b, 0);
    let totalVoltage = current * totalResistance;
    let totalPower = current * totalVoltage;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let e = current * r;
      let p = current * e;
      answerKey.push({ p: round(p), e: round(e), i: round(current), r: round(r), label: "R" + (i+1) });
    }

    answerKey.push({
      p: round(totalPower),
      e: round(totalVoltage),
      i: round(current),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }

  if (circuitType === "parallel") {
    let voltage = rand(12, 48);
    let totalCurrent = 0;
    let totalPower = 0;

    for (let i = 0; i < resistorCount; i++) {
      let r = resistors[i];
      let current = voltage / r;
      let power = voltage * current;
      totalCurrent += current;
      totalPower += power;

      answerKey.push({ p: round(power), e: round(voltage), i: round(current), r: round(r), label: "R" + (i+1) });
    }

    let totalResistance = voltage / totalCurrent;

    answerKey.push({
      p: round(totalPower),
      e: round(voltage),
      i: round(totalCurrent),
      r: round(totalResistance),
      label: "TOTAL"
    });
  }
}

function buildChart() {
  const tbody = document.querySelector("#chart tbody");
  tbody.innerHTML = "";

  answerKey.forEach((row, rowIndex) => {
    let tr = document.createElement("tr");

    ["p", "e", "i", "r"].forEach(key => {
      let td = document.createElement("td");
      let input = document.createElement("input");

      input.dataset.answer = row[key];

      let reveal = false;

      if (key === "r" && row.label !== "TOTAL") reveal = true;

      if (circuitType === "series" && row.label === "TOTAL" && key === "e") reveal = true;
      if (circuitType === "parallel" && row.label === "TOTAL" && key === "e") reveal = true;

      if (reveal) {
        input.value = row[key];
        input.readOnly = true;
        input.classList.add("locked");
      }

      td.appendChild(input);
      tr.appendChild(td);
    });

    let label = document.createElement("td");
    label.textContent = row.label;
    tr.appendChild(label);

    tbody.appendChild(tr);
  });
}

function checkAnswers() {
  let inputs = document.querySelectorAll("input:not(.locked)");
  let allCorrect = true;

  inputs.forEach(input => {
    let user = Number(input.value);
    let correct = Number(input.dataset.answer);

    input.classList.remove("correct", "wrong");

    if (Math.abs(user - correct) <= 0.05) {
      input.classList.add("correct");
    } else {
      input.classList.add("wrong");
      allCorrect = false;
    }
  });

  if (!allCorrect) {
    losePoint();
  } else {
    document.getElementById("score").textContent = `Circuit Complete! Score: ${score}/10`;
  }
}

function losePoint() {
  if (score > 1) score--;
  document.getElementById("score").textContent = `Score: ${score}/10`;
}

function showHint() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";

  if (circuitType === "series") {
    box.innerHTML = `
      <b>Series Hint:</b><br>
      Current stays the same through every resistor.<br>
      Total resistance adds.<br>
      Total voltage is divided across the resistors.
    `;
  } else {
    box.innerHTML = `
      <b>Parallel Hint:</b><br>
      Voltage stays the same across every branch.<br>
      Total current adds.<br>
      Total resistance is found using reciprocal resistance.
    `;
  }
}

function showFormula() {
  losePoint();
  const box = document.getElementById("hintBox");
  box.style.display = "block";
  box.innerHTML = `
    <b>Formulas:</b><br>
    E = I × R<br>
    I = E ÷ R<br>
    R = E ÷ I<br>
    P = I × E
  `;
}

function drawCircuit() {
  const svg = document.getElementById("circuit");
  svg.innerHTML = "";

  let width = 1000;
  let y = 90;
  let startX = 80;
  let spacing = 800 / resistorCount;

  svg.setAttribute("viewBox", "0 0 1000 180");

  // ground left
  svg.innerHTML += `
    <line x1="50" y1="90" x2="80" y2="90" stroke="black" stroke-width="3"/>
    <line x1="50" y1="90" x2="50" y2="125" stroke="black" stroke-width="3"/>
    <line x1="30" y1="125" x2="70" y2="125" stroke="black" stroke-width="3"/>
    <line x1="36" y1="135" x2="64" y2="135" stroke="black" stroke-width="3"/>
    <line x1="42" y1="145" x2="58" y2="145" stroke="black" stroke-width="3"/>
  `;

  // battery
  svg.innerHTML += `
    <line x1="95" y1="55" x2="95" y2="125" stroke="black" stroke-width="3"/>
    <line x1="120" y1="70" x2="120" y2="110" stroke="black" stroke-width="3"/>
    <line x1="80" y1="90" x2="95" y2="90" stroke="black" stroke-width="3"/>
    <line x1="120" y1="90" x2="150" y2="90" stroke="black" stroke-width="3"/>
  `;

  let x = 150;

  if (circuitType === "series") {
    for (let i = 0; i < resistorCount; i++) {
      let x1 = x;
      let x2 = x + spacing * 0.65;
      let end = x + spacing;

      svg.innerHTML += `<line x1="${x1}" y1="${y}" x2="${x1+20}" y2="${y}" stroke="black" stroke-width="3"/>`;
      svg.innerHTML += zigzag(x1+20, y, x2, y);
      svg.innerHTML += `<text x="${(x1+x2)/2}" y="35" text-anchor="middle" font-size="18">R${i+1}</text>`;
      svg.innerHTML += `<line x1="${x2}" y1="${y}" x2="${end}" y2="${y}" stroke="black" stroke-width="3"/>`;
      x = end;
    }

    svg.innerHTML += `
      <line x1="${x}" y1="${y}" x2="950" y2="${y}" stroke="black" stroke-width="3"/>
      <line x1="950" y1="90" x2="950" y2="125" stroke="black" stroke-width="3"/>
      <line x1="930" y1="125" x2="970" y2="125" stroke="black" stroke-width="3"/>
      <line x1="936" y1="135" x2="964" y2="135" stroke="black" stroke-width="3"/>
      <line x1="942" y1="145" x2="958" y2="145" stroke="black" stroke-width="3"/>
    `;
  }

  if (circuitType === "parallel") {
    svg.innerHTML += `<line x1="150" y1="90" x2="230" y2="90" stroke="black" stroke-width="3"/>`;
    svg.innerHTML += `<line x1="230" y1="40" x2="230" y2="150" stroke="black" stroke-width="3"/>`;
    svg.innerHTML += `<line x1="850" y1="40" x2="850" y2="150" stroke="black" stroke-width="3"/>`;

    let branchGap = 110 / Math.max(resistorCount - 1, 1);

    for (let i = 0; i < resistorCount; i++) {
      let by = resistorCount === 1 ? 90 : 40 + branchGap * i;

      svg.innerHTML += `<line x1="230" y1="${by}" x2="300" y2="${by}" stroke="black" stroke-width="3"/>`;
      svg.innerHTML += zigzag(300, by, 780, by);
      svg.innerHTML += `<line x1="780" y1="${by}" x2="850" y2="${by}" stroke="black" stroke-width="3"/>`;
      svg.innerHTML += `<text x="540" y="${by-12}" text-anchor="middle" font-size="16">R${i+1}</text>`;
    }

    svg.innerHTML += `
      <line x1="850" y1="90" x2="950" y2="90" stroke="black" stroke-width="3"/>
      <line x1="950" y1="90" x2="950" y2="125" stroke="black" stroke-width="3"/>
      <line x1="930" y1="125" x2="970" y2="125" stroke="black" stroke-width="3"/>
      <line x1="936" y1="135" x2="964" y2="135" stroke="black" stroke-width="3"/>
      <line x1="942" y1="145" x2="958" y2="145" stroke="black" stroke-width="3"/>
    `;
  }
}

function zigzag(x1, y1, x2, y2) {
  let length = x2 - x1;
  let steps = 8;
  let step = length / steps;
  let path = `M ${x1} ${y1}`;

  for (let i = 1; i < steps; i++) {
    let x = x1 + step * i;
    let y = i % 2 === 0 ? y1 + 22 : y1 - 22;
    path += ` L ${x} ${y}`;
  }

  path += ` L ${x2} ${y2}`;

  return `<path d="${path}" fill="none" stroke="black" stroke-width="3"/>`;
}

newGame();
</script>
</body>
</html>
