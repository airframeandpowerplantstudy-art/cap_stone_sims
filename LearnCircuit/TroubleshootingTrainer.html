<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Troubleshooting Trainer Phase 1</title>
<style>
body{
  background:#061522;
  color:#e8f3ff;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
}
.panel{
  background:#0b2236;
  border:1px solid #1d4d73;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}
button,select{
  padding:8px 12px;
  margin:4px;
  border-radius:8px;
  border:1px solid #3ea6ff;
  background:#123a57;
  color:white;
  cursor:pointer;
}
svg{
  width:100%;
  height:520px;
  background:#08131f;
  border-radius:12px;
  border:1px solid #1d4d73;
}
.wire{
  stroke:#7fd3ff;
  stroke-width:5;
  fill:none;
  stroke-linecap:round;
}
.terminal{
  fill:white;
  stroke:#7fd3ff;
  stroke-width:3;
  cursor:pointer;
}
.terminal:hover{
  fill:#ffd166;
}
.redLead{
  pointer-events:none;
  stroke:#ff4a4a;
  stroke-width:4;
  fill:none;
}
.blackLead{
  pointer-events:none;
  stroke:#ffffff;
  stroke-width:4;
  fill:none;
}
.resBody{
  fill:#d7b075;
  stroke:#2b1b10;
  stroke-width:2;
}
.band{
  stroke:#111;
  stroke-width:.5;
}
.display{
  background:#b8d6c6;
  color:#061522;
  font-size:28px;
  font-family:Courier New;
  padding:14px;
  border-radius:8px;
  margin-top:12px;
}
</style>
</head>
<body>

<div class="panel">
  <h1>Troubleshooting Trainer</h1>

  <button onclick="newTrouble()">New Trouble Circuit</button>

  <select id="circuitType">
    <option value="series">Series</option>
    <option value="parallel">Parallel</option>
    <option value="complex">Complex</option>
  </select>

  <select id="faultType">
    <option value="open">Open</option>
    <option value="added">Added Resistance</option>
    <option value="short">Short</option>
  </select>

  <button onclick="togglePower()">Power</button>
  <button onclick="setMeterMode('volts')">Volts</button>
  <button onclick="setMeterMode('ohms')">Ohms</button>

  <div class="display" id="meterDisplay">0.00 V</div>
</div>

<div class="panel">
  <svg id="schematic" viewBox="0 0 1050 520"></svg>
</div>

<script>
let powerOn=false;
let meterMode='volts';
let redNode=0;
let blackNode=9;
let currentType='series';

const COLORS={
  black:"#111111",
  brown:"#6b3f1f",
  red:"#c22",
  orange:"#f58220",
  yellow:"#ffd21f",
  green:"#168a42",
  blue:"#2459d8",
  violet:"#7d3fb2",
  gray:"#888",
  white:"#f5f5f5",
  gold:"#c8a540"
};

function line(x1,y1,x2,y2){
  return `<line class="wire" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"></line>`;
}

function resistorBands(value){
  const map=["black","brown","red","orange","yellow","green","blue","violet","gray","white"];
  let s=String(value);
  let first=Number(s[0]);
  let second=Number(s[1]);
  let multiplier=s.length-2;
  return [map[first],map[second],map[multiplier],"gold"];
}

function drawResistor(svg,x1,y1,x2,y2,label,value){
  const mid=(x1+x2)/2;
  const w=70;
  const h=26;

  svg.innerHTML += `<line class="wire" x1="${x1}" y1="${y1}" x2="${mid-w/2}" y2="${y1}"></line>`;
  svg.innerHTML += `<line class="wire" x1="${mid+w/2}" y1="${y1}" x2="${x2}" y2="${y2}"></line>`;

  svg.innerHTML += `<rect class="resBody" x="${mid-w/2}" y="${y1-h/2}" width="${w}" height="${h}" rx="12"></rect>`;

  const bands=resistorBands(value);

  bands.forEach((b,i)=>{
    svg.innerHTML += `<rect class="band" x="${mid-22+i*14}" y="${y1-h/2}" width="8" height="${h}" fill="${COLORS[b]}"></rect>`;
  });

  svg.innerHTML += `<text x="${mid}" y="${y1-24}" fill="#7fd3ff" text-anchor="middle">${label}</text>`;
}

function terminal(svg,x,y,node,label){
  svg.innerHTML += `<circle class="terminal" cx="${x}" cy="${y}" r="9"
    onclick="setLead('red',${node})"
    oncontextmenu="event.preventDefault();setLead('black',${node});return false;"></circle>`;

  svg.innerHTML += `<text x="${x}" y="${y+28}" fill="#7fd3ff" text-anchor="middle">${label}</text>`;
}

function drawBattery(svg){
  svg.innerHTML += line(40,260,75,260);
  svg.innerHTML += line(75,225,75,295);
  svg.innerHTML += line(95,240,95,280);
  svg.innerHTML += line(115,225,115,295);
  svg.innerHTML += line(135,240,135,280);
  svg.innerHTML += line(135,260,170,260);
}

function drawGround(svg,x,y){
  svg.innerHTML += line(x,y,x,y+30);
  svg.innerHTML += line(x-20,y+30,x+20,y+30);
  svg.innerHTML += line(x-14,y+40,x+14,y+40);
  svg.innerHTML += line(x-8,y+50,x+8,y+50);
}

function drawLeads(svg){
  const points={
    0:[260,260],
    1:[360,260],
    2:[470,260],
    3:[590,260],
    4:[700,260],
    5:[820,260],
    9:[960,260]
  };

  const r=points[redNode];
  const b=points[blackNode];

  if(r){
    svg.innerHTML += `<path class="redLead" d="M 80 500 C 150 470, ${r[0]-40} ${r[1]+60}, ${r[0]} ${r[1]}"></path>`;
  }

  if(b){
    svg.innerHTML += `<path class="blackLead" d="M 180 500 C 250 470, ${b[0]-40} ${b[1]+60}, ${b[0]} ${b[1]}"></path>`;
  }
}

function drawSeries(svg){
  drawBattery(svg);

  svg.innerHTML += line(170,260,260,260);

  drawResistor(svg,360,260,470,260,"R1",1000);
  drawResistor(svg,590,260,700,260,"R2",2200);
  drawResistor(svg,820,260,930,260,"R3",4700);

  svg.innerHTML += line(260,260,360,260);
  svg.innerHTML += line(470,260,590,260);
  svg.innerHTML += line(700,260,820,260);
  svg.innerHTML += line(930,260,960,260);

  drawGround(svg,960,260);

  terminal(svg,260,260,0,"T0");
  terminal(svg,360,260,1,"T1");
  terminal(svg,470,260,2,"T2");
  terminal(svg,590,260,3,"T3");
  terminal(svg,700,260,4,"T4");
  terminal(svg,820,260,5,"T5");
  terminal(svg,960,260,9,"GND");
}

function drawParallel(svg){
  drawBattery(svg);

  svg.innerHTML += line(170,260,320,260);
  svg.innerHTML += line(320,120,320,400);
  svg.innerHTML += line(820,120,820,400);

  const ys=[150,250,350];

  ys.forEach((y,i)=>{
    drawResistor(svg,320,y,820,y,"R"+(i+1),[1000,2200,4700][i]);
  });

  svg.innerHTML += line(820,260,960,260);

  drawGround(svg,960,260);

  terminal(svg,320,260,0,"T0");
  terminal(svg,820,260,1,"T1");
  terminal(svg,960,260,9,"GND");
}

function drawComplex(svg){
  drawBattery(svg);

  svg.innerHTML += line(170,260,320,260);

  drawResistor(svg,320,260,450,260,"R1",1000);

  svg.innerHTML += line(450,260,560,260);
  svg.innerHTML += line(560,150,560,360);
  svg.innerHTML += line(820,150,820,360);

  drawResistor(svg,560,180,820,180,"R2",2200);
  drawResistor(svg,560,330,820,330,"R3",4700);

  svg.innerHTML += line(820,260,960,260);

  drawGround(svg,960,260);

  terminal(svg,320,260,0,"T0");
  terminal(svg,450,260,1,"T1");
  terminal(svg,560,260,2,"T2");
  terminal(svg,820,260,3,"T3");
  terminal(svg,960,260,9,"GND");
}

function drawCircuit(){
  const svg=document.getElementById('schematic');
  svg.innerHTML='';

  currentType=document.getElementById('circuitType').value;

  if(currentType==='series') drawSeries(svg);
  if(currentType==='parallel') drawParallel(svg);
  if(currentType==='complex') drawComplex(svg);

  drawLeads(svg);
  updateMeter();
}

function setLead(color,node){
  if(color==='red') redNode=node;
  else blackNode=node;

  drawCircuit();
}

function updateMeter(){
  const display=document.getElementById('meterDisplay');

  if(meterMode==='volts'){
    if(!powerOn){
      display.textContent='0.00 V';
    } else {
      display.textContent='24.00 V';
    }
  }

  if(meterMode==='ohms'){
    if(powerOn){
      display.textContent='BLOWN';
    } else {
      display.textContent='1000 Ω';
    }
  }
}

function setMeterMode(mode){
  meterMode=mode;
  updateMeter();
}

function togglePower(){
  powerOn=!powerOn;
  updateMeter();
}

function newTrouble(){
  drawCircuit();
}

window.newTrouble=newTrouble;
window.setLead=setLead;
window.togglePower=togglePower;
window.setMeterMode=setMeterMode;

newTrouble();
</script>

</body>
</html>
