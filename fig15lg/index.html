<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fig 15 Landing Gear Interactive Schematic</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.topPanel {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: #1f2937;
  border-bottom: 2px solid #374151;
}

.lamp {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #222;
  border: 3px solid #666;
}

.green.on {
  background: #00ff66;
  box-shadow: 0 0 18px #00ff66;
}

.red.on {
  background: #ff3333;
  box-shadow: 0 0 18px #ff3333;
}

#hornBox {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid #666;
  background: #333;
  font-weight: bold;
}

#hornBox.on {
  background: #ffcc00;
  color: black;
  box-shadow: 0 0 18px #ffcc00;
}

.main {
  display: flex;
  flex-direction: row-reverse;
  height: calc(100vh - 70px);
}

.controls {
  width: 240px;
  background: #1f2937;
  padding: 16px;
  border-left: 2px solid #374151;
  box-shadow: inset 3px 0 10px rgba(0,0,0,0.35);
}

button {
  width: 100%;
  padding: 10px;
  margin: 7px 0;
  border: none;
  border-radius: 8px;
  background: #374151;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button.active {
  background: #2563eb;
}

button.warning-active {
  background: #991b1b;
}

.viewer {
  flex: 1;
  overflow: auto;
  background: #e5e7eb;
}

#stage {
  position: relative;
  width: 865px;
  height: 608px;
  margin: 25px auto;
  background-image: url("fig15.png");
  background-size: 865px 608px;
  background-repeat: no-repeat;
  background-position: top left;
  border: 2px solid #111;
}

svg {
  position: absolute;
  left: 0;
  top: 0;
  width: 865px;
  height: 608px;
  pointer-events: none;
}

.wire {
  fill: none;
  stroke: transparent;
  stroke-width: 7;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.wire.power-on {
  stroke: #00b7ff;
  filter: drop-shadow(0 0 4px #00b7ff);
}

.wire.green-on {
  stroke: #00e676;
  filter: drop-shadow(0 0 4px #00e676);
}

.wire.red-on {
  stroke: #ff3333;
  filter: drop-shadow(0 0 4px #ff3333);
}

.wire.warn-on {
  stroke: #ffcc00;
  filter: drop-shadow(0 0 4px #ffcc00);
}

.map-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: magenta;
  border-radius: 50%;
  transform: translate(-4px, -4px);
  z-index: 50;
  pointer-events: none;
}

.note {
  font-size: 12px;
  color: #d1d5db;
  line-height: 1.4;
  margin-top: 12px;
}

.status {
  margin-top: 12px;
  padding: 10px;
  background: #111827;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
}
</style>
</head>

<body>

  <strong>GREEN GEAR DOWN</strong>

</div>

<script>
let powerOn = false;
let gearUp = false;
let throttleRetard = false;
let controlValveNeutral = true;
let pushTestActive = false;
let gearTransitioning = false;
let gearTimer = null;

const greenLamp = document.getElementById("greenLamp");
const redLamp = document.getElementById("redLamp");
const hornBox = document.getElementById("hornBox");

const powerBtn = document.getElementById("powerBtn");
const gearBtn = document.getElementById("gearBtn");
const throttleBtn = document.getElementById("throttleBtn");
const valveBtn = document.getElementById("valveBtn");
const testBtn = document.getElementById("testBtn");
const statusBox = document.getElementById("statusBox");
const stage = document.getElementById("stage");

function togglePower() {
  powerOn = !powerOn;

  if (!powerOn) {
    gearTransitioning = false;
    pushTestActive = false;

    if (gearTimer) {
      clearTimeout(gearTimer);
      gearTimer = null;
    }
  }

  updateSystem();
}

function toggleGear() {
  gearUp = !gearUp;

  if (gearTimer) {
    clearTimeout(gearTimer);
    gearTimer = null;
  }

  if (powerOn && gearUp) {
    gearTransitioning = true;
    updateSystem();

    gearTimer = setTimeout(() => {
      gearTransitioning = false;
      gearTimer = null;
      updateSystem();
    }, 5000);
  } else {
    gearTransitioning = false;
    updateSystem();
  }
}

function toggleThrottle() {
  throttleRetard = !throttleRetard;
  updateSystem();
}

function toggleValve() {
  controlValveNeutral = !controlValveNeutral;
  updateSystem();
}

function pushToTest() {
  if (!powerOn) return;

  pushTestActive = true;
  updateSystem();

  setTimeout(() => {
    pushTestActive = false;
    updateSystem();
  }, 700);
}

function clearPaths() {
  document.querySelectorAll(".wire").forEach(path => {
    path.classList.remove("power-on", "green-on", "red-on", "warn-on");
  });
}

function lightPath(id, className) {
  const path = document.getElementById(id);
  if (path) {
    path.classList.add(className);
  }
}

function updateButtons() {
  powerBtn.textContent = powerOn ? "Power: ON" : "Power: OFF";
  gearBtn.textContent = gearUp ? "Gear: UP" : "Gear: DOWN";
  throttleBtn.textContent = throttleRetard ? "Throttle: RETARD" : "Throttle: FORWARD";
  valveBtn.textContent = controlValveNeutral ? "Control Valve: NEUTRAL" : "Control Valve: NOT NEUTRAL";

  powerBtn.classList.toggle("active", powerOn);
  gearBtn.classList.toggle("active", gearUp);
  throttleBtn.classList.toggle("active", throttleRetard);
  valveBtn.classList.toggle("warning-active", !controlValveNeutral);
  testBtn.classList.toggle("warning-active", pushTestActive);
}

function updateSystem() {
  clearPaths();
  updateButtons();

  const gearDown = !gearUp;

  const greenOn =
    powerOn &&
    gearDown &&
    controlValveNeutral;

  const redOn =
    powerOn &&
    (
      gearUp ||
      pushTestActive ||
      !controlValveNeutral
    );

  const hornOn =
    powerOn &&
    gearUp &&
    throttleRetard &&
    !gearTransitioning;

  greenLamp.classList.toggle("on", greenOn || pushTestActive);
  redLamp.classList.toggle("on", redOn);

  hornBox.classList.toggle("on", hornOn);
  hornBox.textContent = hornOn ? "HORN ON" : "HORN OFF";

  if (!powerOn) {
    statusBox.textContent = "Status: Power off";
    return;
  }

  if (gearTransitioning) {
    statusBox.textContent = "Status: Gear UP selected — relay energized for 5 seconds";
  } else if (gearUp) {
    statusBox.textContent = throttleRetard
      ? "Status: Gear UP — red light and horn active"
      : "Status: Gear UP — red light active";
  } else if (!controlValveNeutral) {
    statusBox.textContent = "Status: Gear DOWN, control valve NOT neutral";
  } else {
    statusBox.textContent = "Status: Gear DOWN — green light active";
  }

  /* PUSH TO TEST */
  if (pushTestActive) {
    lightPath("path-push-test-red", "red-on");
    lightPath("path-push-test-green", "green-on");
  }

  /* GEAR DOWN */
  if (gearDown && controlValveNeutral && !pushTestActive) {
    lightPath("path-select-gear-down", "power-on");
    lightPath("path-gear-down-green", "green-on");
  }

  /* SELECT GEAR UP: 5 SECOND TRANSITION */
  if (gearUp && gearTransitioning) {
    lightPath("path-select-gear-up", "power-on");
    lightPath("path-select-up-initiate-relay", "power-on");
  }

  /* AFTER 5 SECONDS: GEAR UP INDICATION */
  if (gearUp && !gearTransitioning) {
    lightPath("path-gear-up-red", "red-on");

    if (throttleRetard) {
      lightPath("path-gear-up-horn", "warn-on");
    }
  }
}

/* F12 CONSOLE MAP POINT TOOL */
let pointNumber = 1;

stage.addEventListener("click", function(event) {
  const rect = stage.getBoundingClientRect();

  const x = Math.round(event.clientX - rect.left);
  const y = Math.round(event.clientY - rect.top);

  console.log(`L${pointNumber} ${x} ${y}`);

  const dot = document.createElement("div");
  dot.className = "map-dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  stage.appendChild(dot);

  pointNumber++;
});

updateSystem();
</script>
