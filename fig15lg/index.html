<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fig 15 Landing Gear Interactive Schematic</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.topPanel {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: #1f2937;
  border-bottom: 2px solid #374151;
}

.lamp {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #222;
  border: 3px solid #666;
}

.green.on {
  background: #00ff66;
  box-shadow: 0 0 18px #00ff66;
}

.red.on {
  background: #ff3333;
  box-shadow: 0 0 18px #ff3333;
}

#hornBox {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid #666;
  background: #333;
  font-weight: bold;
}

#hornBox.on {
  background: #ffcc00;
  color: black;
  box-shadow: 0 0 18px #ffcc00;
}

.main {
  display: flex;
  flex-direction: row-reverse;
  height: calc(100vh - 70px);
}
  .switch-blade {
  stroke: #111;
  stroke-width: 5;
  stroke-linecap: round;
  transition: all 0.35s ease;
  filter: drop-shadow(0 0 2px white);
}

/* gear selector */
.switch-blade.gear-up-position {
  x1: 418px;
  y1: 49px;
  x2: 455px;
  y2: 49px;
}

.switch-blade.gear-down-position {
  x1: 421px;
  y1: 90px;
  x2: 457px;
  y2: 238px;
}

/* relay */
.switch-blade.relay-open-position {
  x1: 735px;
  y1: 183px;
  x2: 755px;
  y2: 126px;
}

.switch-blade.relay-closed-position {
  x1: 735px;
  y1: 183px;
  x2: 684px;
  y2: 241px;
}

/* throttle */
.switch-blade.throttle-forward-position {
  x1: 713px;
  y1: 334px;
  x2: 752px;
  y2: 322px;
}

.switch-blade.throttle-retard-position {
  x1: 713px;
  y1: 334px;
  x2: 763px;
  y2: 341px;
}

.controls {
  width: 240px;
  background: #1f2937;
  padding: 16px;
  border-left: 2px solid #374151;
  box-shadow: inset 3px 0 10px rgba(0,0,0,0.35);
}

button {
  width: 100%;
  padding: 10px;
  margin: 7px 0;
  border: none;
  border-radius: 8px;
  background: #374151;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button.active {
  background: #2563eb;
}

button.warning-active {
  background: #991b1b;
}

.viewer {
  flex: 1;
  overflow: auto;
  background: #e5e7eb;
}

#stage {
  position: relative;
  width: 865px;
  height: 608px;
  margin: 25px auto;
  background-image: url("fig15.png");
  background-size: 865px 608px;
  background-repeat: no-repeat;
  background-position: top left;
  border: 2px solid #111;
}

svg {
  position: absolute;
  left: 0;
  top: 0;
  width: 865px;
  height: 608px;
  pointer-events: none;
}

.wire {
  fill: none;
  stroke: transparent;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.wire.power-on {
  stroke: #00b7ff;
  filter: drop-shadow(0 0 2px #00b7ff);
}

.wire.green-on {
  stroke: #00e676;
  filter: drop-shadow(0 0 2px #00e676);
}

.wire.red-on {
  stroke: #ff3333;
  filter: drop-shadow(0 0 2px #ff3333);
}

.wire.warn-on {
  stroke: #ffcc00;
  filter: drop-shadow(0 0 2px #ffcc00);
}

.map-dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: magenta;
  border-radius: 50%;
  transform: translate(-4px, -4px);
  z-index: 50;
  pointer-events: none;
}

.note {
  font-size: 12px;
  color: #d1d5db;
  line-height: 1.4;
  margin-top: 12px;
}

.status {
  margin-top: 12px;
  padding: 10px;
  background: #111827;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="topPanel">
  <strong>GREEN GEAR DOWN</strong>
  <div id="greenLamp" class="lamp green"></div>

  <strong>RED WARNING</strong>
  <div id="redLamp" class="lamp red"></div>

  <div id="hornBox">HORN OFF</div>
</div>

<div class="main">

  <div class="controls">
    <h2>Landing Gear Controls</h2>

    <button id="powerBtn" onclick="togglePower()">Power: ON</button>
    <button id="gearBtn" onclick="toggleGear()">Gear: DOWN</button>
    <button id="throttleBtn" onclick="toggleThrottle()">Throttle: FORWARD</button>
    <button id="valveBtn" onclick="toggleValve()">Control Valve: NEUTRAL</button>
    <button id="testBtn" onclick="pushToTest()">Push-To-Test</button>

    <div class="status" id="statusBox">
      Status: Gear DOWN — green light active
    </div>

    <div class="note">
      Open console with <strong>F12</strong>.<br>
      Click the schematic to get map points.<br>
      It prints like: <code>L1 123 456</code>
    </div>
  </div>

  <div class="viewer">
    <div id="stage">

      <svg viewBox="0 0 865 608">

        <path id="path-push-test-red" class="wire"
        d="M 75 470 L 106 471 L 381 471 L 381 517 L 506 516 L 508 465 L 544 462 L 582 469 L 596 471 L 596 429 L 733 431 L 732 496" />

        <path id="path-push-test-green" class="wire"
        d="M 75 470 L 106 471 L 379 471 L 381 517 L 635 519 L 636 467 L 660 465 L 696 472 L 731 472 L 731 498" />

        <path id="path-gear-up-red" class="wire"
        d="M 75 470 L 106 471 L 153 331 L 186 310 L 210 310 L 210 450 L 546 450 L 582 468 L 598 471 L 595 429 L 731 429 L 732 496" />

        <path id="path-select-gear-up" class="wire"
        d="M 75 382 L 107 382 L 120 382 L 120 75 L 380 74 L 418 49 L 806 50 L 807 108 L 769 109 L 755 126 L 712 130 L 565 98 L 539 125 L 539 152" />

        <path id="path-select-gear-down" class="wire"
        d="M 75 382 L 106 382 L 118 382 L 120 75 L 383 74 L 421 90 L 421 216 L 457 238 L 503 236 L 504 98 L 538 127 L 538 152" />

        <path id="path-gear-down-green" class="wire"
        d="M 75 470 L 105 469 L 192 518 L 223 539 L 354 540 L 388 538 L 524 540 L 562 540 L 611 540 L 610 452 L 658 449 L 697 470 L 731 472 L 732 497" />

        <path id="path-gear-up-horn" class="wire"
        d="M 76 472 L 106 471 L 106 520 L 191 520 L 226 496 L 224 416 L 251 412 L 251 366 L 252 354 L 293 354 L 293 368 L 421 367 L 420 278 L 455 295 L 456 333 L 713 334 L 713 323 L 752 322 L 763 341" />

        <path id="path-select-up-initiate-relay" class="wire"
        d="M 755 126 L 752 127 L 770 145 L 811 147 L 810 409 L 328 408 L 327 289 L 189 288 L 149 267 L 151 201 L 277 200 L 315 224 L 318 187 L 366 188 L 368 315 L 650 316 L 650 171 L 717 169 L 743 175 L 733 183 L 745 190 L 735 198 L 745 206 L 721 209 L 685 212 L 684 241" />
<!-- ANIMATED SWITCH BLADES -->

<!-- Gear selector switch -->
<line id="gearSwitchBlade"
   x1="421" y1="90"
  x2="457" y2="238"
  class="switch-blade gear-down-position" />

<!-- Relay contact / initiate relay visual -->
<line id="relaySwitchBlade"
  x1="735" y1="183"
  x2="755" y2="126"
  class="switch-blade relay-open-position" />

<!-- Throttle switch -->
<line id="throttleSwitchBlade"
  x1="713" y1="334"
  x2="752" y2="322"
  class="switch-blade throttle-forward-position" />
      </svg>
    </div>
  </div>

</div>

<script>
let powerOn = true;
let gearUp = false;
let throttleRetard = false;
let controlValveNeutral = true;
let pushTestActive = false;

let gearTransitioning = false;
let gearDirection = null;
let gearTimer = null;

const greenLamp = document.getElementById("greenLamp");
const redLamp = document.getElementById("redLamp");
const hornBox = document.getElementById("hornBox");

const powerBtn = document.getElementById("powerBtn");
const gearBtn = document.getElementById("gearBtn");
const throttleBtn = document.getElementById("throttleBtn");
const valveBtn = document.getElementById("valveBtn");
const testBtn = document.getElementById("testBtn");
const statusBox = document.getElementById("statusBox");
const stage = document.getElementById("stage");

  
function togglePower() {
  powerOn = !powerOn;

  if (!powerOn) {
    gearTransitioning = false;
    pushTestActive = false;
    gearDirection = null;

    if (gearTimer) {
      clearTimeout(gearTimer);
      gearTimer = null;
    }
  }

  updateSystem();
}
function updateSwitchAnimations() {
  const gearSwitchBlade = document.getElementById("gearSwitchBlade");
  const relaySwitchBlade = document.getElementById("relaySwitchBlade");
  const throttleSwitchBlade = document.getElementById("throttleSwitchBlade");

  gearSwitchBlade.classList.remove("gear-up-position", "gear-down-position");
  relaySwitchBlade.classList.remove("relay-open-position", "relay-closed-position");
  throttleSwitchBlade.classList.remove("throttle-forward-position", "throttle-retard-position");

  if (gearTransitioning && gearDirection === "up") {
    gearSwitchBlade.classList.add("gear-up-position");
    relaySwitchBlade.classList.add("relay-closed-position");
  } else if (gearTransitioning && gearDirection === "down") {
    gearSwitchBlade.classList.add("gear-down-position");
    relaySwitchBlade.classList.add("relay-open-position");
  } else if (gearUp) {
    gearSwitchBlade.classList.add("gear-up-position");
    relaySwitchBlade.classList.add("relay-open-position");
  } else {
    gearSwitchBlade.classList.add("gear-down-position");
    relaySwitchBlade.classList.add("relay-open-position");
  }

  if (throttleRetard) {
    throttleSwitchBlade.classList.add("throttle-retard-position");
  } else {
    throttleSwitchBlade.classList.add("throttle-forward-position");
  }
}
function toggleGear() {
  if (!powerOn || gearTransitioning) return;

  if (gearTimer) {
    clearTimeout(gearTimer);
    gearTimer = null;
  }

  if (!gearUp) {
    gearDirection = "up";
    gearTransitioning = true;
    updateSystem();

    gearTimer = setTimeout(() => {
      gearUp = true;
      gearTransitioning = false;
      gearDirection = null;
      gearTimer = null;
      updateSystem();
    }, 5000);

  } else {
    gearDirection = "down";
    gearTransitioning = true;
    updateSystem();

    gearTimer = setTimeout(() => {
      gearUp = false;
      gearTransitioning = false;
      gearDirection = null;
      gearTimer = null;
      updateSystem();
    }, 5000);
  }
}

function toggleThrottle() {
  throttleRetard = !throttleRetard;
  updateSystem();
}

function toggleValve() {
  controlValveNeutral = !controlValveNeutral;
  updateSystem();
}

function pushToTest() {
  if (!powerOn) return;

  pushTestActive = true;
  updateSystem();

  setTimeout(() => {
    pushTestActive = false;
    updateSystem();
  }, 700);
}

function clearPaths() {
  document.querySelectorAll(".wire").forEach(path => {
    path.classList.remove("power-on", "green-on", "red-on", "warn-on");
  });
}

function lightPath(id, className) {
  const path = document.getElementById(id);
  if (path) path.classList.add(className);
}

function updateButtons() {
  powerBtn.textContent = powerOn ? "Power: ON" : "Power: OFF";
  gearBtn.textContent = gearTransitioning
    ? (gearDirection === "up" ? "Gear: TRAVELING UP" : "Gear: TRAVELING DOWN")
    : (gearUp ? "Gear: UP" : "Gear: DOWN");

  throttleBtn.textContent = throttleRetard ? "Throttle: RETARD" : "Throttle: FORWARD";
  valveBtn.textContent = controlValveNeutral ? "Control Valve: NEUTRAL" : "Control Valve: NOT NEUTRAL";

  powerBtn.classList.toggle("active", powerOn);
  gearBtn.classList.toggle("active", gearUp || gearTransitioning);
  throttleBtn.classList.toggle("active", throttleRetard);
  valveBtn.classList.toggle("warning-active", !controlValveNeutral);
  testBtn.classList.toggle("warning-active", pushTestActive);
}

function updateSystem() {
  clearPaths();
  updateButtons();
  updateSwitch();

  const greenOn =
    powerOn &&
    !gearUp &&
    !gearTransitioning &&
    controlValveNeutral;

  const redOn =
    powerOn &&
    !gearTransitioning &&
    (
      gearUp ||
      pushTestActive ||
      !controlValveNeutral
    );

  const hornOn =
    powerOn &&
    gearUp &&
    throttleRetard &&
    !gearTransitioning;

  greenLamp.classList.toggle("on", greenOn || pushTestActive);
  redLamp.classList.toggle("on", redOn);

  hornBox.classList.toggle("on", hornOn);
  hornBox.textContent = hornOn ? "HORN ON" : "HORN OFF";

  if (!powerOn) {
    statusBox.textContent = "Status: Power off";
    return;
  }

  if (gearTransitioning && gearDirection === "up") {
    statusBox.textContent = "Status: Gear UP selected — relay energized for 5 seconds";
  } else if (gearTransitioning && gearDirection === "down") {
    statusBox.textContent = "Status: Gear DOWN selected — down circuit energized for 5 seconds";
  } else if (gearUp) {
    statusBox.textContent = throttleRetard
      ? "Status: Gear UP — red light and horn active"
      : "Status: Gear UP — red light active";
  } else if (!controlValveNeutral) {
    statusBox.textContent = "Status: Gear DOWN, control valve NOT neutral";
  } else {
    statusBox.textContent = "Status: Gear DOWN — green light active";
  }

  if (pushTestActive) {
    lightPath("path-push-test-red", "red-on");
    lightPath("path-push-test-green", "green-on");
  }

  if (gearTransitioning && gearDirection === "up") {
    lightPath("path-select-gear-up", "power-on");
    lightPath("path-select-up-initiate-relay", "power-on");
  }

  if (!gearTransitioning && gearUp) {
    lightPath("path-gear-up-red", "red-on");

    if (throttleRetard) {
      lightPath("path-gear-up-horn", "warn-on");
    }
  }

  if (gearTransitioning && gearDirection === "down") {
    lightPath("path-select-gear-down", "power-on");
  }

  if (!gearTransitioning && !gearUp && controlValveNeutral) {
    lightPath("path-gear-down-green", "green-on");
  }
}

/* F12 CONSOLE MAP POINT TOOL */
let pointNumber = 1;

stage.addEventListener("click", function(event) {
  const rect = stage.getBoundingClientRect();

  const x = Math.round(event.clientX - rect.left);
  const y = Math.round(event.clientY - rect.top);

  console.log(`L${pointNumber} ${x} ${y}`);

  const dot = document.createElement("div");
  dot.className = "map-dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  stage.appendChild(dot);

  pointNumber++;
});

updateSystem();
</script>

</body>
</html>
