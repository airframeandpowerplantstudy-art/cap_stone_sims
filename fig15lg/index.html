<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fig 15 Landing Gear Interactive Schematic</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
  }

  .topPanel {
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #1f2937;
    border-bottom: 2px solid #374151;
  }

  .lamp {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #222;
    border: 3px solid #666;
  }

  .green.on {
    background: #00ff66;
    box-shadow: 0 0 18px #00ff66;
  }

  .red.on {
    background: #ff3333;
    box-shadow: 0 0 18px #ff3333;
  }

  #hornBox {
    padding: 10px 16px;
    border-radius: 8px;
    border: 2px solid #666;
    background: #333;
    font-weight: bold;
  }

  #hornBox.on {
    background: #ffcc00;
    color: black;
    box-shadow: 0 0 18px #ffcc00;
  }

 .main {
  display: flex;
  flex-direction: row-reverse;
  height: calc(100vh - 70px);
}

.controls {
  width: 240px;
  background: #1f2937;
  padding: 16px;
  border-left: 2px solid #374151;
}

  button {
    width: 100%;
    padding: 10px;
    margin: 7px 0;
    border: none;
    border-radius: 8px;
    background: #374151;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  button.active {
    background: #2563eb;
  }

  .viewer {
    flex: 1;
    overflow: auto;
    background: #e5e7eb;
  }

  #stage {
    position: relative;
    width: 865px;
    height: 608px;
    margin: 25px auto;
    background-image: url("fig15.png");
    background-size: 865px 608px;
    background-repeat: no-repeat;
    background-position: top left;
    border: 2px solid #111;
  }

  svg {
    position: absolute;
    left: 0;
    top: 0;
    width: 865px;
    height: 608px;
    pointer-events: none;
  }

  .wire {
    fill: none;
    stroke: transparent;
    stroke-width: 7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .wire.power-on {
    stroke: #00b7ff;
    filter: drop-shadow(0 0 4px #00b7ff);
  }

  .wire.green-on {
    stroke: #00e676;
    filter: drop-shadow(0 0 4px #00e676);
  }

  .wire.red-on {
    stroke: #ff3333;
    filter: drop-shadow(0 0 4px #ff3333);
  }

  .wire.warn-on {
    stroke: #ffcc00;
    filter: drop-shadow(0 0 4px #ffcc00);
  }

  .map-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: magenta;
    border-radius: 50%;
    transform: translate(-4px, -4px);
    z-index: 50;
  }

  .note {
    font-size: 12px;
    color: #d1d5db;
    line-height: 1.4;
    margin-top: 12px;
  }
</style>
</head>

<body>

<div class="topPanel">
  <strong>GREEN GEAR DOWN</strong>
  <div id="greenLamp" class="lamp green"></div>

  <strong>RED WARNING</strong>
  <div id="redLamp" class="lamp red"></div>

  <div id="hornBox">HORN OFF</div>
</div>

<div class="main">

  <div class="controls">
    <h2>Landing Gear Controls</h2>

    <button id="powerBtn" onclick="togglePower()">Power: OFF</button>
    <button id="gearBtn" onclick="toggleGear()">Gear: DOWN</button>
    <button id="throttleBtn" onclick="toggleThrottle()">Throttle: FORWARD</button>
    <button id="valveBtn" onclick="toggleValve()">Control Valve: NEUTRAL</button>
    <button id="testBtn" onclick="pushToTest()">Push-To-Test Red Lamp</button>

    <div class="note">
      Open console with <strong>F12</strong>.<br>
      Click the schematic to get map points.<br>
      It prints like: <code>L1 123 456</code>
    </div>
  </div>

  <div class="viewer">
    <div id="stage">

      <svg viewBox="0 0 865 608">

        <!-- PUT MAP POINT PATHS HERE -->

        <path id="path-power-main" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-1" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-2" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-3" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-4" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-5" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-6" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-7" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-8" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-10" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-11" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-12" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-13" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-14" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-15" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-16" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-17" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-18" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-19" class="wire" d="M 0 0 L 0 0" />
        <path id="path-wire-20" class="wire" d="M 0 0 L 0 0" />

      </svg>
    </div>
  </div>

</div>

<script>
let powerOn = false;
let gearUp = false;
let throttleRetard = false;
let controlValveNeutral = true;
let pushTestActive = false;

function togglePower() {
  powerOn = !powerOn;
  updateSystem();
}

function toggleGear() {
  gearUp = !gearUp;
  updateSystem();
}

function toggleThrottle() {
  throttleRetard = !throttleRetard;
  updateSystem();
}

function toggleValve() {
  controlValveNeutral = !controlValveNeutral;
  updateSystem();
}

function pushToTest() {
  pushTestActive = true;
  updateSystem();

  setTimeout(() => {
    pushTestActive = false;
    updateSystem();
  }, 700);
}

function clearPaths() {
  document.querySelectorAll(".wire").forEach(path => {
    path.classList.remove("power-on", "green-on", "red-on", "warn-on");
  });
}

function lightPath(id, className) {
  const path = document.getElementById(id);
  if (path) path.classList.add(className);
}

function updateSystem() {
  clearPaths();

  const gearDown = !gearUp;

  const greenOn = powerOn && gearDown && controlValveNeutral;

  const redOn = powerOn && (
    gearUp ||
    throttleRetard ||
    !controlValveNeutral ||
    pushTestActive
  );

  const hornOn = powerOn && gearUp && throttleRetard;

  greenLamp.classList.toggle("on", greenOn);
  redLamp.classList.toggle("on", redOn);

  hornBox.classList.toggle("on", hornOn);
  hornBox.textContent = hornOn ? "HORN ON" : "HORN OFF";

  powerBtn.textContent = powerOn ? "Power: ON" : "Power: OFF";
  gearBtn.textContent = gearUp ? "Gear: UP" : "Gear: DOWN";
  throttleBtn.textContent = throttleRetard ? "Throttle: RETARD" : "Throttle: FORWARD";
  valveBtn.textContent = controlValveNeutral ? "Control Valve: NEUTRAL" : "Control Valve: NOT NEUTRAL";

  powerBtn.classList.toggle("active", powerOn);
  gearBtn.classList.toggle("active", gearUp);
  throttleBtn.classList.toggle("active", throttleRetard);
  valveBtn.classList.toggle("active", !controlValveNeutral);

  if (!powerOn) return;

  lightPath("path-wire-20", "power-on");
  lightPath("path-wire-1", "power-on");

  if (greenOn) {
    lightPath("path-wire-3", "green-on");
    lightPath("path-wire-4", "green-on");
    lightPath("path-wire-5", "green-on");
    lightPath("path-wire-6", "green-on");
    lightPath("path-wire-18", "green-on");
  }

  if (redOn) {
    lightPath("path-wire-10", "red-on");
    lightPath("path-wire-17", "red-on");
    lightPath("path-wire-19", "red-on");
  }

  if (hornOn) {
    lightPath("path-wire-10", "warn-on");
    lightPath("path-wire-12", "warn-on");
  }
}

/* F12 CONSOLE MAP POINT TOOL */
let pointNumber = 1;

stage.addEventListener("click", function(event) {
  const rect = stage.getBoundingClientRect();

  const x = Math.round(event.clientX - rect.left);
  const y = Math.round(event.clientY - rect.top);

  console.log(`L${pointNumber} ${x} ${y}`);

  const dot = document.createElement("div");
  dot.className = "map-dot";
  dot.style.left = x + "px";
  dot.style.top = y + "px";
  stage.appendChild(dot);

  pointNumber++;
});

updateSystem();
</script>

</body>
</html>
