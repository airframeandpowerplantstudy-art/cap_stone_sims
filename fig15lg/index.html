<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fig 15 Landing Gear Interactive Schematic</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.topPanel {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: #1f2937;
  border-bottom: 2px solid #374151;
}

.lamp {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #222;
  border: 3px solid #666;
}

.green.on {
  background: #00ff66;
  box-shadow: 0 0 18px #00ff66;
}

.red.on {
  background: #ff3333;
  box-shadow: 0 0 18px #ff3333;
}

#hornBox {
  padding: 10px 16px;
  border-radius: 8px;
  border: 2px solid #666;
  background: #333;
  font-weight: bold;
}

#hornBox.on {
  background: #ffcc00;
  color: black;
  box-shadow: 0 0 18px #ffcc00;
}

.main {
  display: flex;
  flex-direction: row-reverse;
  height: calc(100vh - 70px);
}

.controls {
  width: 240px;
  background: #1f2937;
  padding: 16px;
  border-left: 2px solid #374151;
}

button {
  width: 100%;
  padding: 10px;
  margin: 7px 0;
  border: none;
  border-radius: 8px;
  background: #374151;
  color: white;
  font-size: 15px;
  cursor: pointer;
}

button.active {
  background: #2563eb;
}

.viewer {
  flex: 1;
  overflow: auto;
  background: #e5e7eb;
}

#stage {
  position: relative;
  width: 865px;
  height: 608px;
  margin: 25px auto;
  background-image: url("fig15.png");
  background-size: 865px 608px;
  background-repeat: no-repeat;
  border: 2px solid #111;
}

svg {
  position: absolute;
  left: 0;
  top: 0;
  width: 865px;
  height: 608px;
  pointer-events: none;
}

.wire {
  fill: none;
  stroke: transparent;
  stroke-width: 4;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.wire.power-on {
  stroke: #00b7ff;
  filter: drop-shadow(0 0 2px #00b7ff);
}

.wire.green-on {
  stroke: #00e676;
  filter: drop-shadow(0 0 2px #00e676);
}

.wire.red-on {
  stroke: #ff3333;
  filter: drop-shadow(0 0 2px #ff3333);
}

.wire.warn-on {
  stroke: #ffcc00;
  filter: drop-shadow(0 0 2px #ffcc00);
}

.wire.draw-wire {
  animation: drawWire 2.8s ease forwards;
}

@keyframes drawWire {
  to {
    stroke-dashoffset: 0;
  }
}

.electron {
  r: 4;
  fill: white;
  stroke: #111827;
  stroke-width: 1;
  filter: drop-shadow(0 0 4px white);
}

.switch-blade {
  stroke: #3b82f6;
  stroke-width: 4;
  stroke-linecap: round;
  transition: all 1.2s ease;
  filter: drop-shadow(0 0 4px #93c5fd);
}

.status {
  margin-top: 12px;
  padding: 10px;
  background: #111827;
  border-radius: 8px;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="topPanel">
  <strong>GREEN GEAR DOWN</strong>
  <div id="greenLamp" class="lamp green"></div>

  <strong>RED WARNING</strong>
  <div id="redLamp" class="lamp red"></div>

  <div id="hornBox">HORN OFF</div>
</div>

<div class="main">

<div class="controls">

<h2>Landing Gear Controls</h2>

<button id="powerBtn" onclick="togglePower()">Power: ON</button>
<button id="gearBtn" onclick="toggleGear()">Gear: DOWN</button>
<button id="throttleBtn" onclick="toggleThrottle()">Throttle: RETARD</button>
<button id="testBtn" onclick="pushToTest()">Push-To-Test</button>

<div class="status" id="statusBox">
Status: Gear DOWN — green light active
</div>

</div>

<div class="viewer">
<div id="stage">

<svg viewBox="0 0 865 608">

<!-- PATHS -->

<path id="path-select-gear-up" class="wire"
d="M 75 382 L 107 382 L 120 382 L 120 75 L 380 74 L 418 49 L 806 50 L 807 108 L 769 109 L 755 126" />

<path id="path-select-up-initiate-relay" class="wire"
d="M 755 126 L 752 127 L 770 145 L 811 147 L 810 409 L 328 408 L 327 289 L 189 288 L 149 267 L 151 201 L 277 200 L 315 224 L 318 187 L 366 188 L 368 315 L 650 316 L 650 171 L 717 169 L 743 175 L 733 183 L 745 190 L 735 198 L 745 206 L 721 209 L 685 212 L 684 241" />

<path id="path-relay-closed-to-motor" class="wire"
d="M 753 128 L 712 131 L 568 130 L 567 98 L 537 126 L 539 152" />

<path id="path-select-gear-down" class="wire"
d="M 75 382 L 106 382 L 118 382 L 120 75 L 383 74 L 421 90 L 421 216 L 457 238 L 503 236 L 504 98 L 538 127 L 538 152" />

<path id="path-gear-up-red" class="wire"
d="M 75 470 L 106 471 L 153 331 L 186 310 L 210 310 L 210 450 L 546 450 L 582 468 L 598 471 L 595 429 L 731 429 L 732 496" />

<path id="path-gear-down-green" class="wire"
d="M 75 470 L 105 469 L 192 518 L 223 539 L 354 540 L 388 538 L 524 540 L 562 540 L 611 540 L 610 452 L 658 449 L 697 470 L 731 472 L 732 497" />

<path id="path-gear-up-horn" class="wire"
d="M 76 472 L 106 471 L 106 520 L 191 520 L 226 496 L 224 416 L 251 412 L 251 366 L 252 354 L 293 354 L 293 368 L 421 367 L 420 278 L 455 295 L 456 333 L 713 334 L 713 323 L 752 322 L 763 341" />

<!-- ELECTRONS -->
<g id="electronLayer"></g>

<!-- SWITCHES -->

<line id="sw-relay" class="switch-blade"
x1="713" y1="112"
x2="750" y2="112" />

<line id="sw-gear-selector" class="switch-blade"
x1="382" y1="74"
x2="421" y2="92" />

</svg>

</div>
</div>
</div>

<script>

let powerOn = true;
let gearUp = false;
let throttleRetard = true;

let gearTransitioning = false;
let gearDirection = null;

let relayClosed = false;

let gearTimer = null;
let relayCloseTimer = null;

const greenLamp = document.getElementById("greenLamp");
const redLamp = document.getElementById("redLamp");
const hornBox = document.getElementById("hornBox");

const electronLayer = document.getElementById("electronLayer");

function moveSwitch(id, x1, y1, x2, y2) {
  const sw = document.getElementById(id);

  sw.setAttribute("x1", x1);
  sw.setAttribute("y1", y1);
  sw.setAttribute("x2", x2);
  sw.setAttribute("y2", y2);
}

function updateSwitchAnimations() {

  const gearDownComplete =
    !gearUp && !gearTransitioning;

  const gearUpComplete =
    gearUp && !gearTransitioning;

  if ((gearTransitioning && gearDirection === "up") || gearUp) {

    moveSwitch(
      "sw-gear-selector",
      382, 74,
      419, 50
    );

  } else {

    moveSwitch(
      "sw-gear-selector",
      382, 74,
      421, 92
    );
  }

  if (relayClosed) {

    moveSwitch(
      "sw-relay",
      713, 130,
      750, 130
    );

  } else {

    moveSwitch(
      "sw-relay",
      713, 112,
      750, 112
    );
  }
}

function clearPaths() {

  document.querySelectorAll(".wire").forEach(path => {

    path.classList.remove(
      "power-on",
      "green-on",
      "red-on",
      "warn-on",
      "draw-wire"
    );

    path.style.strokeDasharray = "";
    path.style.strokeDashoffset = "";
  });

  clearElectrons();
}

function addElectronFlow(path) {

  const length = path.getTotalLength();

  for (let i = 0; i < 4; i++) {

    const dot =
      document.createElementNS(
        "http://www.w3.org/2000/svg",
        "circle"
      );

    dot.setAttribute("class", "electron");

    electronLayer.appendChild(dot);

    electronFlows.push({
      path: path,
      dot: dot,
      length: length,
      offset: i * 0.25,
      speed: 0.00018
    });
  }

  if (!electronAnimationFrame) {
    animateElectrons();
  }
}

let electronFlows = [];
let electronAnimationFrame = null;

function clearElectrons() {

  electronLayer.innerHTML = "";
  electronFlows = [];

  if (electronAnimationFrame) {

    cancelAnimationFrame(
      electronAnimationFrame
    );

    electronAnimationFrame = null;
  }
}

function animateElectrons() {

  electronFlows.forEach(flow => {

    const t =
      (
        (performance.now() * flow.speed)
        + flow.offset
      ) % 1;

    const point =
      flow.path.getPointAtLength(
        t * flow.length
      );

    flow.dot.setAttribute("cx", point.x);
    flow.dot.setAttribute("cy", point.y);

  });

  electronAnimationFrame =
    requestAnimationFrame(
      animateElectrons
    );
}

function lightPath(
  id,
  className,
  draw = true,
  electrons = true
) {

  const path =
    document.getElementById(id);

  if (!path) return;

  path.classList.add(className);

  if (draw) {

    const length =
      path.getTotalLength();

    path.style.strokeDasharray =
      length;

    path.style.strokeDashoffset =
      length;

    requestAnimationFrame(() => {

      path.classList.add(
        "draw-wire"
      );
    });
  }

  if (electrons) {
    addElectronFlow(path);
  }
}

function togglePower() {

  powerOn = !powerOn;

  updateSystem(false);
}

function toggleThrottle() {

  throttleRetard =
    !throttleRetard;

  updateSystem(false);
}

function pushToTest() {

  // placeholder
}

function toggleGear() {

  if (!powerOn || gearTransitioning)
    return;

  relayClosed = false;

  if (!gearUp) {

    gearDirection = "up";
    gearTransitioning = true;

    updateSystem();

    relayCloseTimer = setTimeout(() => {

      relayClosed = true;

      updateSystem();

    }, 2600);

    gearTimer = setTimeout(() => {

      gearUp = true;
      gearTransitioning = false;
      gearDirection = null;
      relayClosed = false;

      updateSystem();

    }, 5000);

  } else {

    gearDirection = "down";
    gearTransitioning = true;

    updateSystem();

    gearTimer = setTimeout(() => {

      gearUp = false;
      gearTransitioning = false;
      gearDirection = null;

      updateSystem();

    }, 5000);
  }
}

function updateSystem(
  animateMainWires = true
) {

  clearPaths();

  updateSwitchAnimations();

  const greenOn =
    powerOn &&
    !gearUp &&
    !gearTransitioning;

  const redOn =
    powerOn &&
    !gearTransitioning &&
    gearUp;

  const hornOn =
    powerOn &&
    gearUp &&
    throttleRetard;

  greenLamp.classList.toggle(
    "on",
    greenOn
  );

  redLamp.classList.toggle(
    "on",
    redOn
  );

  hornBox.classList.toggle(
    "on",
    hornOn
  );

  hornBox.textContent =
    hornOn
      ? "HORN ON"
      : "HORN OFF";

  if (!powerOn)
    return;

  if (
    gearTransitioning &&
    gearDirection === "up"
  ) {

    lightPath(
      "path-select-gear-up",
      "power-on",
      true,
      true
    );

    lightPath(
      "path-select-up-initiate-relay",
      "power-on",
      true,
      true
    );

    if (relayClosed) {

      lightPath(
        "path-relay-closed-to-motor",
        "power-on",
        true,
        true
      );
    }
  }

  if (
    !gearTransitioning &&
    gearUp
  ) {

    lightPath(
      "path-gear-up-red",
      "red-on",
      animateMainWires,
      false
    );

    if (throttleRetard) {

      lightPath(
        "path-gear-up-horn",
        "warn-on",
        true,
        true
      );
    }
  }

  if (
    gearTransitioning &&
    gearDirection === "down"
  ) {

    lightPath(
      "path-select-gear-down",
      "power-on",
      true,
      true
    );
  }

  if (
    !gearTransitioning &&
    !gearUp
  ) {

    lightPath(
      "path-gear-down-green",
      "green-on",
      animateMainWires,
      false
    );
  }
}

updateSystem();

</script>
</body>
</html>
